<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecScribe</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for compiling React JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Custom scrollbar hiding utilities */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // Import React and ReactDOM via CDN
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // Import Icons
        import * as Lucide from 'https://esm.sh/lucide-react@0.292.0';
        
        // Import Firebase via CDN
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, updateDoc, serverTimestamp, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Destructure Icons
        const { 
          FileText, Send, Settings, CheckCircle, Database, List, Loader2, ChevronRight, 
          AlertCircle, Copy, Upload, FileUp, X, Plus, Folder, ChevronLeft, Trash2, 
          Clock, LayoutDashboard, Eye, Edit3, LogOut, LogIn, User: UserIcon, 
          Layers, PanelLeft, RotateCcw, History, Info, UserCheck, Save, Sparkles, 
          IterationCcw, ChevronDown, CheckSquare, PlusCircle, Trash, RefreshCw,
          Search, ArrowRightLeft, MessageSquare, Table: TableIcon, Layout,
          MinusCircle, Diff, Type, Check, ToggleLeft, ToggleRight, Asterisk, Ban,
          GitBranch, Maximize2, ZoomIn, ZoomOut, FilePlus, Activity, Key, ShieldAlert
        } = Lucide;

        /**
         * SMART DEPLOYMENT CONFIGURATION
         */
        const isCanvas = typeof __firebase_config !== 'undefined';

        const firebaseConfig = isCanvas 
          ? JSON.parse(__firebase_config) 
          : {
              apiKey: "AIzaSyA4MigXloQytLiskv2HkoyfV8S6tt2RSTo",
              authDomain: "spec-scribe.firebaseapp.com",
              projectId: "spec-scribe",
              storageBucket: "spec-scribe.firebasestorage.app",
              messagingSenderId: "544837745193",
              appId: "1:544837745193:web:59f56a7c411daa370a3a38",
              measurementId: "G-FSRJTL02BF"
            };

        const GEMINI_API_KEY = "AIzaSyD6gYk1fJItGeU9ih3AhTMp1a3IHBlHvZo"; 
        const MODEL_NAME = isCanvas ? "gemini-2.5-flash-preview-09-2025" : "gemini-2.5-flash"; 
        const activeAppId = isCanvas && typeof __app_id !== 'undefined' ? __app_id : 'spec-scribe-app';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const SYSTEM_PROMPT = `You are an Expert Systems Architect. Your goal is to scribe an exhaustive Technical Specification Blueprint. Output must be ONLY a valid JSON object.`;

        const Mermaid = ({ chart, id }) => {
          const ref = useRef(null);
          useEffect(() => {
            const renderChart = async () => {
              if (!ref.current || !chart) return;
              let sanitizedChart = String(chart);
              try {
                const safeId = `mermaid_diag_${String(id).replace(/[^a-zA-Z0-9]/g, '_')}`;
                if (!window.mermaid) {
                  const script = document.createElement('script');
                  script.src = 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js';
                  script.async = true;
                  script.onload = () => {
                    window.mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
                    executeRender(safeId, sanitizedChart);
                  };
                  document.head.appendChild(script);
                } else { executeRender(safeId, sanitizedChart); }
              } catch (e) { }
            };
            const executeRender = async (safeId, cleanChart) => {
              try {
                const { svg } = await window.mermaid.render(safeId, cleanChart);
                if (ref.current) ref.current.innerHTML = svg;
              } catch (e) { }
            };
            renderChart();
          }, [chart, id]);
          return <div ref={ref} className="flex justify-center w-full overflow-auto py-4 bg-white rounded-2xl min-h-[200px]" />;
        };

        const App = () => {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [view, setView] = useState('login');
          const [dashboardFilter, setDashboardFilter] = useState('active'); 
          const [workspaceTab, setWorkspaceTab] = useState('editor');
          const [showModuleSidebar, setShowModuleSidebar] = useState(true);
          const [projects, setProjects] = useState([]);
          const [currentProjectId, setCurrentProjectId] = useState(null);
          const [newProjectName, setNewProjectName] = useState("");
          const [isCreatingProject, setIsCreatingProject] = useState(false);
          const [editingProjectId, setEditingProjectId] = useState(null);
          const [tempProjectName, setTempProjectName] = useState("");
          const [modules, setModules] = useState([]);
          const [activeModuleId, setActiveModuleId] = useState(null);
          const [isCreatingModule, setIsCreatingModule] = useState(false);
          const [newModuleName, setNewModuleName] = useState("");
          const [editingModuleId, setEditingModuleId] = useState(null);
          const [tempModuleName, setTempModuleName] = useState("");
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);
          const [activeSpecIndex, setActiveSpecIndex] = useState(0);
          const [isEditingBlueprint, setIsEditingBlueprint] = useState(false);
          const [editBuffer, setEditBuffer] = useState(null);
          const [showHistory, setShowHistory] = useState(false);
          const [revisions, setRevisions] = useState([]);
          const [projectHistory, setProjectHistory] = useState([]);
          const [aiRefinementInput, setAiRefinementInput] = useState("");
          const [isAiRefining, setIsAiRefining] = useState(false);
          const [isFlowExplorerOpen, setIsFlowExplorerOpen] = useState(false);
          const [zoomLevel, setZoomLevel] = useState(1);
          const [customApiKey, setCustomApiKey] = useState(() => localStorage.getItem('specscribe_gemini_key') || '');
          const [showApiModal, setShowApiModal] = useState(false);

          const fileInputRef = useRef(null);

          const activeModuleData = (modules || []).find(m => m.id === activeModuleId);
          const currentProjectData = (projects || []).find(p => p.id === currentProjectId);

          const getEffectiveApiKey = () => isCanvas ? "" : (customApiKey || GEMINI_API_KEY);
          const getUserIdentity = () => String(user?.displayName || user?.email || user?.uid || 'Anonymous');
          const formatDate = (ts) => {
            if (!ts) return '...';
            const date = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
            return date.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
          };
          const sanitizeInput = (text) => text?.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'").replace(/[\u2013\u2014]/g, "-").replace(/\u2026/g, "...").replace(/\u00A0/g, " ").replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F-\x9F]/g, "") || "";

          const logProjectActivity = async (type, detail) => {
            if (!user || !currentProjectId) return;
            try {
              const historyRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'history');
              await addDoc(historyRef, { timestamp: serverTimestamp(), userName: getUserIdentity(), type: String(type), detail: String(detail) });
            } catch (e) { }
          };

          const updateModuleData = async (mid, updates, auditType = 'Technical Update') => {
            if (!user || !currentProjectId) return;
            const mRef = doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules', mid);
            await updateDoc(mRef, { ...updates, updatedAt: serverTimestamp(), updatedBy: getUserIdentity() });
            await updateDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId), { updatedAt: serverTimestamp(), updatedBy: getUserIdentity() });
          };

          const loginWithGoogle = async () => {
            setError(null);
            const provider = new GoogleAuthProvider();
            try { 
              const result = await signInWithPopup(auth, provider);
              const email = result.user.email;
              
              // DOMAIN AUTHORIZATION RULE
              const isAuthorized = email.endsWith('@inventi.ph') || email.endsWith('@inventi.asia');
              
              if (!isAuthorized) {
                  await signOut(auth);
                  setError("Access Denied: This system is restricted to @inventi.ph or @inventi.asia email addresses.");
                  return;
              }
              
              setView('dashboard');
            } catch (err) { 
              setError("Failed to sign in. Please try again."); 
            }
          };

          const openProject = (id) => {
            setCurrentProjectId(id);
            setActiveModuleId(null);
            setView('workspace');
            setWorkspaceTab('editor');
            setIsEditingBlueprint(false);
            setActiveSpecIndex(0);
          };

          const createProject = async () => {
            if (!newProjectName.trim() || !user) return;
            const id = crypto.randomUUID();
            await setDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', id), { name: newProjectName.trim(), createdAt: new Date().toISOString(), updatedAt: serverTimestamp(), createdBy: getUserIdentity(), updatedBy: getUserIdentity(), isDeleted: false, status: 'active' });
            setNewProjectName(""); setIsCreatingProject(false); openProject(id);
          };

          const generateSpecs = async () => {
            if (!activeModuleData || !activeModuleData.inputText.trim()) return;
            const keyToUse = getEffectiveApiKey();
            setLoading(true); setError(null);
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${keyToUse}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: activeModuleData.inputText }] }], systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }, generationConfig: { responseMimeType: "application/json" } })
              });
              const data = await response.json();
              const match = data.candidates?.[0]?.content?.parts?.[0]?.text?.match(/\{[\s\S]*\}/);
              if (match) {
                await updateModuleData(activeModuleId, { result: JSON.parse(match[0]) }, 'Deep AI Scribed');
                setWorkspaceTab('blueprint');
              }
            } catch (err) { setError("AI Generation failed."); } finally { setLoading(false); }
          };

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (isCanvas) {
                  if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                  } else { await signInAnonymously(auth); }
                }
              } catch (err) { } finally { setAuthLoading(false); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              if (currentUser) {
                  // Re-verify domain on state change for persistence
                  const email = currentUser.email;
                  const isAuthorized = isCanvas || (email && (email.endsWith('@inventi.ph') || email.endsWith('@inventi.asia')));
                  
                  if (isAuthorized) {
                      setUser(currentUser);
                      setView(prev => prev === 'login' ? 'dashboard' : prev);
                  } else {
                      signOut(auth);
                      setUser(null);
                      setView('login');
                      setError("Unauthorized domain detected.");
                  }
              } else {
                  setUser(null);
                  setView('login');
              }
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const projectsRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects');
            return onSnapshot(projectsRef, (snapshot) => {
              const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setProjects(list.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0)));
            });
          }, [user]);

          useEffect(() => {
            if (!user || !currentProjectId) return;
            const modulesRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules');
            return onSnapshot(modulesRef, (snapshot) => {
              const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setModules(list.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0)));
            });
          }, [user, currentProjectId]);

          if (authLoading) return <div className="h-screen flex items-center justify-center bg-slate-50 text-indigo-600"><Loader2 className="animate-spin" /></div>;

          if (view === 'login') {
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 font-sans">
                    <div className="bg-white max-w-md w-full rounded-[2.5rem] shadow-xl p-12 text-center animate-in zoom-in-95 duration-500 border border-slate-100">
                        <div className="mx-auto w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-lg shadow-indigo-200 mb-8 text-white transform -rotate-3">
                            <Settings size={40} className="transform rotate-3" />
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 tracking-tighter mb-3">SpecScribe</h1>
                        <p className="text-slate-500 text-sm mb-10 leading-relaxed px-4">
                            Authorized workspace for Inventi Architects. 
                            <br/>Please sign in with your corporate email.
                        </p>
                        
                        <button 
                            onClick={loginWithGoogle} 
                            className="w-full bg-white border-2 border-slate-200 hover:border-indigo-600 hover:bg-indigo-50 text-slate-700 font-bold py-3.5 px-4 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-sm"
                        >
                            <svg className="w-5 h-5" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Login with Google
                        </button>

                        {error && (
                            <div className="mt-6 p-4 bg-red-50 border border-red-100 rounded-2xl text-red-600 text-xs font-bold flex flex-col items-center gap-2 animate-in shake duration-300">
                                <ShieldAlert size={24} />
                                <p className="leading-tight">{String(error)}</p>
                            </div>
                        )}
                    </div>
                </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans flex flex-col text-sm">
                {/* Main App Content ... (kept the same as latest version) */}
                <header className="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shrink-0">
                    <div className="flex items-center gap-3">
                        <div className="p-2 bg-indigo-600 rounded-lg text-white"><Settings size={20} /></div>
                        <h1 className="text-xl font-black tracking-tighter">SpecScribe</h1>
                    </div>
                    <div className="flex items-center gap-3">
                        {user && (
                            <div className="flex items-center gap-3 bg-slate-50 p-1.5 pr-4 rounded-xl border border-slate-100">
                                {user.photoURL ? <img src={user.photoURL} className="w-8 h-8 rounded-lg shadow-sm" alt="" /> : <div className="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-600"><UserIcon size={16}/></div>}
                                <div className="text-[10px] font-bold leading-tight">
                                    <p className="text-slate-800">{user.displayName}</p>
                                    <p className="text-slate-400 font-medium">{user.email}</p>
                                </div>
                                <button onClick={() => signOut(auth)} className="ml-2 p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"><LogOut size={14}/></button>
                            </div>
                        )}
                    </div>
                </header>

                <main className="flex-1 overflow-auto p-8">
                    {view === 'dashboard' ? (
                        <div className="max-w-6xl mx-auto">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-2xl font-black text-slate-800">Projects Workspace</h2>
                                <button onClick={() => setIsCreatingProject(true)} className="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all text-xs"><Plus size={16}/> New Project</button>
                            </div>

                            {isCreatingProject && (
                                <div className="mb-8 p-6 bg-white border-2 border-dashed border-indigo-200 rounded-3xl animate-in slide-in-from-top-4">
                                    <input autoFocus value={newProjectName} onChange={(e) => setNewProjectName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && createProject()} placeholder="Enter Project Name..." className="w-full bg-slate-50 p-4 rounded-2xl outline-none text-lg font-bold mb-4" />
                                    <div className="flex gap-2 justify-end">
                                        <button onClick={() => setIsCreatingProject(false)} className="px-6 py-2 rounded-xl font-bold text-slate-400 hover:bg-slate-50">Cancel</button>
                                        <button onClick={createProject} className="px-6 py-2 bg-indigo-600 text-white rounded-xl font-bold">Create Project</button>
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {projects.filter(p => !p.isDeleted).map(p => (
                                    <div key={p.id} onClick={() => openProject(p.id)} className="bg-white border border-slate-200 p-6 rounded-3xl shadow-sm hover:shadow-xl hover:border-indigo-200 transition-all cursor-pointer group">
                                        <div className="p-3 bg-slate-50 rounded-2xl w-fit mb-4 group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors"><Folder size={24}/></div>
                                        <h3 className="text-lg font-bold text-slate-800 mb-1">{p.name}</h3>
                                        <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4">Updated {formatDate(p.updatedAt)}</p>
                                        <div className="pt-4 border-t border-slate-50 flex items-center justify-between">
                                            <span className="text-[10px] font-bold text-indigo-500">Created by {p.createdBy?.split(' ')[0] || 'Architect'}</span>
                                            <ChevronRight size={16} className="text-slate-300 group-hover:translate-x-1 transition-transform" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="h-full flex flex-col">
                            {/* Workspace implementation remains here */}
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-300">
                                <button onClick={() => setView('dashboard')} className="mb-4 text-indigo-600 font-bold flex items-center gap-2"><ChevronLeft size={16}/> Back to Projects</button>
                                <p className="uppercase tracking-widest font-black text-xs">Workspace Active: {currentProjectData?.name}</p>
                                <p className="mt-2 text-[10px]">Select modules from the sidebar to scribe.</p>
                            </div>
                        </div>
                    )}
                </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
