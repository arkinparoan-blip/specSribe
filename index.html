<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecScribe | Inventi Architects</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for compiling React JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Mammoth for Word Document parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        /* Custom scrollbar hiding utilities */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // Import React and ReactDOM via CDN
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // Import Icons
        import * as Lucide from 'https://esm.sh/lucide-react@0.292.0';
        
        // Import Firebase via CDN
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, updateDoc, serverTimestamp, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { 
          FileText, Send, Settings, CheckCircle, Database, List, Loader2, ChevronRight, 
          AlertCircle, Copy, Upload, FileUp, X, Plus, Folder, ChevronLeft, Trash2, 
          Clock, LayoutDashboard, Eye, Edit3, LogOut, LogIn, User: UserIcon, 
          Layers, PanelLeft, RotateCcw, History, Info, UserCheck, Save, Sparkles, 
          IterationCcw, ChevronDown, CheckSquare, PlusCircle, Trash, RefreshCw,
          Search, ArrowRightLeft, MessageSquare, Table: TableIcon, Layout,
          MinusCircle, Diff, Type, Check, ToggleLeft, ToggleRight, Asterisk, Ban,
          GitBranch, Maximize2, ZoomIn, ZoomOut, FilePlus, Activity, Key, ShieldAlert
        } = Lucide;

        /**
         * SMART DEPLOYMENT CONFIGURATION
         */
        const isCanvas = typeof __firebase_config !== 'undefined';

        const firebaseConfig = isCanvas 
          ? JSON.parse(__firebase_config) 
          : {
              apiKey: "AIzaSyA4MigXloQytLiskv2HkoyfV8S6tt2RSTo",
              authDomain: "spec-scribe.firebaseapp.com",
              projectId: "spec-scribe",
              storageBucket: "spec-scribe.firebasestorage.app",
              messagingSenderId: "544837745193",
              appId: "1:544837745193:web:59f56a7c411daa370a3a38",
              measurementId: "G-FSRJTL02BF"
            };

        const GEMINI_API_KEY = "AIzaSyD6gYk1fJItGeU9ih3AhTMp1a3IHBlHvZo"; 
        const MODEL_NAME = isCanvas ? "gemini-2.5-flash-preview-09-2025" : "gemini-2.5-flash"; 
        const activeAppId = isCanvas && typeof __app_id !== 'undefined' ? __app_id : 'spec-scribe-app';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const SYSTEM_PROMPT = `You are an Expert Systems Architect. Your goal is to scribe an exhaustive Technical Specification Blueprint. 
CRITICAL: Focus strictly on the PROVIDED MODULE. Identify every requirement and business rule. 
Generate a "flowchart_mermaid" string using 'graph TD'. Labels MUST be in double quotes: NodeID["Label"]. 
Output must be ONLY a valid JSON object.`;

        const Mermaid = ({ chart, id }) => {
          const ref = useRef(null);
          useEffect(() => {
            const renderChart = async () => {
              if (!ref.current || !chart) return;
              try {
                const safeId = `mermaid_diag_${String(id).replace(/[^a-zA-Z0-9]/g, '_')}`;
                if (!window.mermaid) {
                  const script = document.createElement('script');
                  script.src = 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js';
                  script.async = true;
                  script.onload = () => {
                    window.mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose', flowchart: { curve: 'basis', htmlLabels: true } });
                    executeRender(safeId, chart);
                  };
                  document.head.appendChild(script);
                } else { executeRender(safeId, chart); }
              } catch (e) { }
            };
            const executeRender = async (safeId, cleanChart) => {
              try {
                const { svg } = await window.mermaid.render(safeId, cleanChart);
                if (ref.current) ref.current.innerHTML = svg;
              } catch (e) { 
                  if (ref.current) ref.current.innerHTML = '<div class="p-4 text-rose-400 text-[10px] font-bold border border-dashed rounded-xl">Flowchart Syntax Error</div>';
              }
            };
            renderChart();
          }, [chart, id]);
          return <div ref={ref} className="flex justify-center w-full overflow-auto py-4 bg-white rounded-2xl min-h-[200px]" />;
        };

        const App = () => {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [view, setView] = useState('login');
          const [dashboardFilter, setDashboardFilter] = useState('active'); 
          const [workspaceTab, setWorkspaceTab] = useState('editor');
          const [showModuleSidebar, setShowModuleSidebar] = useState(true);
          const [projects, setProjects] = useState([]);
          const [currentProjectId, setCurrentProjectId] = useState(null);
          const [newProjectName, setNewProjectName] = useState("");
          const [isCreatingProject, setIsCreatingProject] = useState(false);
          const [editingProjectId, setEditingProjectId] = useState(null);
          const [tempProjectName, setTempProjectName] = useState("");
          const [modules, setModules] = useState([]);
          const [activeModuleId, setActiveModuleId] = useState(null);
          const [isCreatingModule, setIsCreatingModule] = useState(false);
          const [newModuleName, setNewModuleName] = useState("");
          const [editingModuleId, setEditingModuleId] = useState(null);
          const [tempModuleName, setTempModuleName] = useState("");
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);
          const [activeSpecIndex, setActiveSpecIndex] = useState(0);
          const [isEditingBlueprint, setIsEditingBlueprint] = useState(false);
          const [editBuffer, setEditBuffer] = useState(null);
          const [showHistory, setShowHistory] = useState(false);
          const [revisions, setRevisions] = useState([]);
          const [projectHistory, setProjectHistory] = useState([]);
          const [aiRefinementInput, setAiRefinementInput] = useState("");
          const [isAiRefining, setIsAiRefining] = useState(false);
          const [isFlowExplorerOpen, setIsFlowExplorerOpen] = useState(false);
          const [zoomLevel, setZoomLevel] = useState(1);
          const [customApiKey, setCustomApiKey] = useState(() => localStorage.getItem('specscribe_gemini_key') || '');
          const [showApiModal, setShowApiModal] = useState(false);

          const fileInputRef = useRef(null);

          const activeModuleData = (modules || []).find(m => m.id === activeModuleId);
          const currentProjectData = (projects || []).find(p => p.id === currentProjectId);

          const getEffectiveApiKey = () => isCanvas ? "" : (customApiKey || GEMINI_API_KEY);
          const getUserIdentity = () => String(user?.displayName || user?.email || user?.uid || 'Anonymous');
          const formatDate = (ts) => {
            if (!ts) return '...';
            const date = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
            return date.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
          };

          const logProjectActivity = async (type, detail) => {
            if (!user || !currentProjectId) return;
            try {
              const historyRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'history');
              await addDoc(historyRef, { timestamp: serverTimestamp(), userName: getUserIdentity(), type: String(type), detail: String(detail) });
            } catch (e) { }
          };

          const updateModuleData = async (mid, updates) => {
            if (!user || !currentProjectId) return;
            const mRef = doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules', mid);
            await updateDoc(mRef, { ...updates, updatedAt: serverTimestamp(), updatedBy: getUserIdentity() });
            await updateDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId), { updatedAt: serverTimestamp(), updatedBy: getUserIdentity() });
          };

          const loginWithGoogle = async () => {
            setError(null);
            const provider = new GoogleAuthProvider();
            try { 
              const result = await signInWithPopup(auth, provider);
              const email = result.user.email;
              const isAuthorized = email.endsWith('@inventi.ph') || email.endsWith('@inventi.asia');
              if (!isAuthorized) {
                  await signOut(auth);
                  setError("Access Denied: Use @inventi.ph or @inventi.asia email.");
                  return;
              }
              setView('dashboard');
            } catch (err) { setError("Failed to sign in."); }
          };

          const openProject = (id) => {
            setCurrentProjectId(id);
            setActiveModuleId(null);
            setView('workspace');
            setWorkspaceTab('editor');
            setIsEditingBlueprint(false);
            setActiveSpecIndex(0);
          };

          const createProject = async () => {
            if (!newProjectName.trim() || !user) return;
            const id = crypto.randomUUID();
            await setDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', id), { name: newProjectName.trim(), createdAt: new Date().toISOString(), updatedAt: serverTimestamp(), createdBy: getUserIdentity(), updatedBy: getUserIdentity(), isDeleted: false, status: 'active' });
            setNewProjectName(""); setIsCreatingProject(false); openProject(id);
          };

          const createModule = async () => {
            if (!newModuleName.trim() || !user || !currentProjectId) return;
            const id = crypto.randomUUID();
            const name = newModuleName.trim();
            await setDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules', id), { name, createdAt: serverTimestamp(), updatedAt: serverTimestamp(), createdBy: getUserIdentity(), updatedBy: getUserIdentity(), inputText: "", result: null, fileName: "" });
            await logProjectActivity('Module Created', `Added module: ${name}`);
            setNewModuleName(""); setIsCreatingModule(false); setActiveModuleId(id); setWorkspaceTab('editor');
          };

          const generateSpecs = async () => {
            if (!activeModuleData || !activeModuleData.inputText.trim()) return;
            const keyToUse = getEffectiveApiKey();
            setLoading(true); setError(null);
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${keyToUse}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: activeModuleData.inputText }] }], systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }, generationConfig: { responseMimeType: "application/json", temperature: 0.1 } })
              });
              const data = await response.json();
              const match = data.candidates?.[0]?.content?.parts?.[0]?.text?.match(/\{[\s\S]*\}/);
              if (match) {
                await updateModuleData(activeModuleId, { result: JSON.parse(match[0]) });
                setWorkspaceTab('blueprint');
              }
            } catch (err) { setError("AI Generation failed. Check API key."); } finally { setLoading(false); }
          };

          const handleFileUpload = async (event) => {
            const file = event.target.files?.[0];
            if (!file || !activeModuleId) return;
            setLoading(true);
            try {
              let content = "";
              if (file.name.endsWith('.docx')) {
                const arrayBuffer = await file.arrayBuffer();
                const result = await window.mammoth.extractRawText({ arrayBuffer });
                content = result.value;
              } else { content = await file.text(); }
              await updateModuleData(activeModuleId, { inputText: content, fileName: file.name });
            } catch (e) { setError("Import failed."); } finally { setLoading(false); }
          };

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (isCanvas) {
                  if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                  } else { await signInAnonymously(auth); }
                }
              } catch (err) { } finally { setAuthLoading(false); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              if (currentUser) {
                  const email = currentUser.email;
                  const isAuthorized = isCanvas || (email && (email.endsWith('@inventi.ph') || email.endsWith('@inventi.asia')));
                  if (isAuthorized) { setUser(currentUser); setView(prev => prev === 'login' ? 'dashboard' : prev); } 
                  else { signOut(auth); setView('login'); setError("Unauthorized domain."); }
              } else { setView('login'); }
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const projectsRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects');
            return onSnapshot(projectsRef, (snapshot) => {
              setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0)));
            });
          }, [user]);

          useEffect(() => {
            if (!user || !currentProjectId) return;
            const modulesRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules');
            return onSnapshot(modulesRef, (snapshot) => {
              setModules(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0)));
            });
          }, [user, currentProjectId]);

          if (authLoading) return <div className="h-screen flex items-center justify-center text-indigo-600"><Loader2 className="animate-spin" /></div>;

          if (view === 'login') {
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                    <div className="bg-white max-w-md w-full rounded-[2.5rem] shadow-xl p-12 text-center animate-in zoom-in-95 duration-500 border border-slate-100">
                        <div className="mx-auto w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-lg shadow-indigo-200 mb-8 text-white transform -rotate-3">
                            <Settings size={40} className="transform rotate-3" />
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 tracking-tighter mb-3">SpecScribe</h1>
                        <p className="text-slate-500 text-sm mb-10 leading-relaxed">Authorized workspace for Inventi Architects.</p>
                        <button onClick={loginWithGoogle} className="w-full bg-white border-2 border-slate-200 hover:border-indigo-600 hover:bg-indigo-50 text-slate-700 font-bold py-3.5 px-4 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-sm">
                            <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            Login with Google
                        </button>
                        {error && <div className="mt-6 p-4 bg-red-50 border border-red-100 rounded-2xl text-red-600 text-xs font-bold flex flex-col items-center gap-2"><ShieldAlert size={24}/><p>{String(error)}</p></div>}
                    </div>
                </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col text-sm h-screen overflow-hidden">
                <header className="bg-white border-b border-slate-200 px-8 py-3 flex justify-between items-center shrink-0">
                    <div className="flex items-center gap-3">
                        <div className="p-2 bg-indigo-600 rounded-lg text-white"><Settings size={18} /></div>
                        <h1 className="text-lg font-black tracking-tighter">SpecScribe</h1>
                    </div>
                    <div className="flex items-center gap-3">
                        {!isCanvas && (
                          <button onClick={() => setShowApiModal(true)} className="p-2 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl text-slate-400 transition-colors">
                              <Key size={16} className={customApiKey ? 'text-emerald-500' : 'text-amber-500'} />
                          </button>
                        )}
                        <div className="flex items-center gap-3 bg-slate-50 p-1 pr-3 rounded-xl border border-slate-100">
                            {user.photoURL ? <img src={user.photoURL} className="w-8 h-8 rounded-lg" alt="" /> : <div className="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-600"><UserIcon size={14}/></div>}
                            <div className="text-[10px] font-bold leading-tight">
                                <p className="text-slate-800">{user.displayName || 'Architect'}</p>
                                <p className="text-slate-400 font-medium">{user.email}</p>
                            </div>
                            <button onClick={() => signOut(auth)} className="ml-1 p-1 text-slate-300 hover:text-red-500"><LogOut size={14}/></button>
                        </div>
                    </div>
                </header>

                {view === 'dashboard' ? (
                  <main className="flex-1 overflow-auto p-12">
                    <div className="max-w-6xl mx-auto">
                        <div className="flex justify-between items-center mb-10">
                            <h2 className="text-2xl font-black text-slate-800 tracking-tight">Technical Projects</h2>
                            <button onClick={() => setIsCreatingProject(true)} className="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all text-xs"><Plus size={16}/> New Project</button>
                        </div>
                        {isCreatingProject && (
                            <div className="mb-10 p-6 bg-white border-2 border-dashed border-indigo-200 rounded-3xl animate-in slide-in-from-top-4">
                                <input autoFocus value={newProjectName} onChange={(e) => setNewProjectName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && createProject()} placeholder="Project Identifier" className="w-full bg-slate-50 p-4 rounded-2xl outline-none text-lg font-bold mb-4" />
                                <div className="flex gap-2 justify-end">
                                    <button onClick={() => setIsCreatingProject(false)} className="px-6 py-2 rounded-xl font-bold text-slate-400 hover:bg-slate-50">Cancel</button>
                                    <button onClick={createProject} className="px-6 py-2 bg-indigo-600 text-white rounded-xl font-bold">Create Workspace</button>
                                </div>
                            </div>
                        )}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {projects.map(p => (
                                <div key={p.id} onClick={() => openProject(p.id)} className="bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-sm hover:shadow-xl hover:border-indigo-200 transition-all cursor-pointer group">
                                    <div className="p-3 bg-slate-50 rounded-2xl w-fit mb-4 group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors"><Folder size={24}/></div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-1">{p.name}</h3>
                                    <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Active Architecture</p>
                                    <div className="mt-6 pt-6 border-t border-slate-50 flex items-center justify-between">
                                        <span className="text-[10px] font-bold text-indigo-500 uppercase tracking-tighter">By {p.createdBy?.split(' ')[0]}</span>
                                        <ChevronRight size={16} className="text-slate-300 group-hover:translate-x-1 transition-transform" />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                  </main>
                ) : (
                  <div className="flex-1 flex overflow-hidden">
                      <aside className="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0">
                          <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                              <button onClick={() => setView('dashboard')} className="p-1 hover:bg-slate-50 text-slate-400"><ChevronLeft size={20}/></button>
                              <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 flex items-center gap-2"><Layers size={14}/> Modules</h3>
                              <button onClick={() => setIsCreatingModule(true)} className="p-1 text-indigo-600 hover:bg-indigo-50 rounded-lg"><Plus size={18}/></button>
                          </div>
                          <div className="flex-1 overflow-y-auto p-3 space-y-1">
                              {isCreatingModule && (
                                  <div className="p-3 bg-indigo-50 rounded-2xl mb-4 border border-indigo-100 animate-in slide-in-from-top-2">
                                      <input autoFocus value={newModuleName} onChange={(e) => setNewModuleName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && createModule()} className="w-full bg-white p-2 rounded-xl text-xs outline-none border border-indigo-200 mb-2" placeholder="Module Name" />
                                      <div className="flex gap-2"><button onClick={createModule} className="flex-1 bg-indigo-600 text-white text-[10px] font-bold py-2 rounded-xl">Add</button><button onClick={() => setIsCreatingModule(false)} className="p-2 text-slate-400"><X size={14}/></button></div>
                                  </div>
                              )}
                              {modules.map(m => (
                                  <div key={m.id} onClick={() => { setActiveModuleId(m.id); setWorkspaceTab(m.result ? 'blueprint' : 'editor'); }} className={`p-4 rounded-2xl cursor-pointer transition-all ${activeModuleId === m.id ? 'bg-indigo-50 text-indigo-700 shadow-sm' : 'hover:bg-slate-50 text-slate-500'}`}>
                                      <div className="flex items-center gap-3">
                                          <div className={`w-2.5 h-2.5 rounded-full ${m.result ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-slate-200'}`}></div>
                                          <span className="text-[11px] font-bold truncate">{m.name}</span>
                                      </div>
                                  </div>
                              ))}
                          </div>
                      </aside>

                      <main className="flex-1 bg-slate-50 overflow-y-auto p-8">
                          {!activeModuleId ? (
                              <div className="h-full flex flex-col items-center justify-center text-slate-300">
                                  <Layers size={48} className="mb-4 opacity-20"/>
                                  <p className="font-bold uppercase tracking-widest text-xs">Select a module to scribe</p>
                              </div>
                          ) : (
                              <div className="max-w-5xl mx-auto h-full flex flex-col">
                                  <div className="flex items-center justify-between mb-6">
                                      <div>
                                          <h2 className="text-2xl font-black text-slate-800 tracking-tight">{activeModuleData.name}</h2>
                                          <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{workspaceTab === 'editor' ? 'Technical Input' : 'System Blueprint'}</p>
                                      </div>
                                      <div className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                                          <button onClick={() => setWorkspaceTab('editor')} className={`px-6 py-2 rounded-xl font-bold text-[10px] transition-all ${workspaceTab === 'editor' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400 hover:text-slate-600'}`}>EDITOR</button>
                                          <button disabled={!activeModuleData.result} onClick={() => setWorkspaceTab('blueprint')} className={`px-6 py-2 rounded-xl font-bold text-[10px] transition-all ${workspaceTab === 'blueprint' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : activeModuleData.result ? 'text-slate-400 hover:text-slate-600' : 'text-slate-200'}`}>BLUEPRINT</button>
                                      </div>
                                  </div>

                                  {workspaceTab === 'editor' ? (
                                      <div className="flex-1 flex flex-col bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden animate-in slide-in-from-bottom-4">
                                          <div className="p-4 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                                              <span className="text-[10px] font-black uppercase text-slate-400 px-4">Requirement Scribing Area</span>
                                              <div className="flex gap-2">
                                                  <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept=".txt,.md,.docx" />
                                                  <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-xl text-[10px] font-bold hover:bg-slate-50 transition-all shadow-sm"><FileUp size={14}/> Import Doc</button>
                                              </div>
                                          </div>
                                          <div className="flex-1 flex flex-col p-6">
                                              {activeModuleData.fileName && <div className="mb-4 bg-indigo-50 p-3 rounded-2xl flex justify-between items-center text-[10px] font-bold text-indigo-700 border border-indigo-100"><span className="flex items-center gap-2"><Upload size={14}/> Source: {activeModuleData.fileName}</span><button onClick={() => updateModuleData(activeModuleId, {fileName: "", inputText: ""})} className="text-indigo-300 hover:text-indigo-600"><X size={14}/></button></div>}
                                              <textarea 
                                                value={activeModuleData.inputText || ""} 
                                                onChange={(e) => updateModuleData(activeModuleId, {inputText: e.target.value})} 
                                                placeholder="Paste or type technical requirements here..." 
                                                className="flex-1 w-full p-6 text-sm leading-relaxed outline-none resize-none text-slate-700 placeholder:text-slate-300 font-sans"
                                              />
                                              <div className="pt-6 border-t border-slate-50 flex justify-end">
                                                  <button onClick={generateSpecs} disabled={loading || !activeModuleData.inputText.trim()} className="bg-indigo-600 hover:bg-indigo-700 text-white font-black px-10 py-3 rounded-[1.5rem] shadow-xl shadow-indigo-100 transition-all flex items-center gap-3">
                                                      {loading ? <Loader2 className="animate-spin" size={18}/> : <><Send size={18}/> Scribe Specs</>}
                                                  </button>
                                              </div>
                                          </div>
                                      </div>
                                  ) : (
                                      activeModuleData.result && (
                                          <div className="space-y-8 pb-12 animate-in fade-in">
                                              <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100">
                                                  <h3 className="text-[10px] font-black uppercase tracking-widest text-amber-500 mb-6 flex items-center gap-2 border-l-4 border-amber-500 pl-4">Architecture Flow</h3>
                                                  <Mermaid id={`flow-${activeModuleId}`} chart={activeModuleData.result.specs?.[activeSpecIndex]?.flowchart_mermaid || "graph TD\\nA[No Logic]"} />
                                              </div>
                                              
                                              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                                  <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100">
                                                      <h3 className="text-[10px] font-black uppercase tracking-widest text-indigo-500 mb-6 flex items-center gap-2 border-l-4 border-indigo-500 pl-4">Functional Detail</h3>
                                                      <div className="text-sm leading-relaxed text-slate-600 bg-slate-50 p-6 rounded-3xl border border-slate-100 shadow-inner min-h-[200px] whitespace-pre-wrap">
                                                          {activeModuleData.result.specs?.[activeSpecIndex]?.details}
                                                      </div>
                                                  </div>
                                                  <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100">
                                                      <h3 className="text-[10px] font-black uppercase tracking-widest text-emerald-500 mb-6 flex items-center gap-2 border-l-4 border-emerald-500 pl-4">Acceptance Criteria</h3>
                                                      <div className="space-y-3">
                                                          {activeModuleData.result.specs?.[activeSpecIndex]?.acceptance_criteria?.map((ac, i) => (
                                                              <div key={i} className="flex gap-4 p-4 bg-emerald-50/50 rounded-2xl border border-emerald-100 text-xs font-bold text-emerald-900 leading-tight">
                                                                  <CheckCircle size={16} className="shrink-0 text-emerald-500"/> {ac}
                                                              </div>
                                                          ))}
                                                      </div>
                                                  </div>
                                              </div>
                                          </div>
                                      )
                                  )}
                              </div>
                          )}
                      </main>
                  </div>
                )}

                {showApiModal && (
                  <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                      <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-full animate-in zoom-in-95">
                          <div className="flex items-center gap-3 mb-4 text-indigo-600"><Key size={24} /><h3 className="text-xl font-black text-slate-800">API Gateway</h3></div>
                          <p className="text-xs text-slate-400 font-medium mb-6">Enter your Google Gemini API Key. Key is stored locally in your browser and never leaves this session.</p>
                          <input type="password" value={customApiKey} onChange={e => setCustomApiKey(e.target.value)} className="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl mb-8 outline-none focus:ring-2 focus:ring-indigo-100 text-sm font-bold" placeholder="AIzaSy..." />
                          <div className="flex justify-end gap-2"><button onClick={() => setShowApiModal(false)} className="px-6 py-2 font-bold text-slate-400">Cancel</button><button onClick={() => {localStorage.setItem('specscribe_gemini_key', customApiKey); setShowApiModal(false);}} className="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold shadow-lg shadow-indigo-100">Save Key</button></div>
                      </div>
                  </div>
                )}
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
