<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecScribe</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for compiling React JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Custom scrollbar hiding utilities */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // Import React and ReactDOM via CDN
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // Import Icons
        import * as Lucide from 'https://esm.sh/lucide-react@0.292.0';
        
        // Import Firebase via CDN
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, updateDoc, serverTimestamp, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Destructure Icons
        const { 
          FileText, Send, Settings, CheckCircle, Database, List, Loader2, ChevronRight, 
          AlertCircle, Copy, Upload, FileUp, X, Plus, Folder, ChevronLeft, Trash2, 
          Clock, LayoutDashboard, Eye, Edit3, LogOut, LogIn, User: UserIcon, 
          Layers, PanelLeft, RotateCcw, History, Info, UserCheck, Save, Sparkles, 
          IterationCcw, ChevronDown, CheckSquare, PlusCircle, Trash, RefreshCw,
          Search, ArrowRightLeft, MessageSquare, Table: TableIcon, Layout,
          MinusCircle, Diff, Type, Check, ToggleLeft, ToggleRight, Asterisk, Ban,
          GitBranch, Maximize2, ZoomIn, ZoomOut, FilePlus, Activity, Key
        } = Lucide;

        /**
         * SMART DEPLOYMENT CONFIGURATION
         * Automatically switches between Canvas Preview Environment and GitHub Deployment
         */
        const isCanvas = typeof __firebase_config !== 'undefined';

        const firebaseConfig = isCanvas 
          ? JSON.parse(__firebase_config) 
          : {
              apiKey: "AIzaSyA4MigXloQytLiskv2HkoyfV8S6tt2RSTo",
              authDomain: "spec-scribe.firebaseapp.com",
              projectId: "spec-scribe",
              storageBucket: "spec-scribe.firebasestorage.app",
              messagingSenderId: "544837745193",
              appId: "1:544837745193:web:59f56a7c411daa370a3a38",
              measurementId: "G-FSRJTL02BF"
            };

        // AI ACCESS KEY & STANDARD MODEL
        const GEMINI_API_KEY = "AIzaSyD6gYk1fJItGeU9ih3AhTMp1a3IHBlHvZo"; 
        const MODEL_NAME = isCanvas ? "gemini-2.5-flash-preview-09-2025" : "gemini-2.5-flash"; 
        const activeAppId = isCanvas && typeof __app_id !== 'undefined' ? __app_id : 'spec-scribe-app';

        // Initialize Services
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const SYSTEM_PROMPT = `You are an Expert Systems Architect. Your goal is to scribe an exhaustive Technical Specification Blueprint.

        CRITICAL INSTRUCTIONS:
        1. SCOPE: Focus strictly on the PROVIDED MODULE.
        2. EXHAUSTIVE EXTRACTION: Identify every requirement and business rule in the text.
        3. DATA MODELING: Precisely assign types, required status, and data sources.
        4. FLOWCHART SYNTAX: Generate a "flowchart_mermaid" string using 'graph TD'. 
           - MANDATORY: Wrap labels in double quotes. Pattern: NodeID["Label Text"]
        5. ACCEPTANCE CRITERIA: Generate testable, specific conditions.

        Output must be ONLY a valid JSON object matching this EXACT structure:
        {
          "project_summary": "Overall module objective summary",
          "specs": [
            {
              "id": "unique-string",
              "feature_name": "Name of the spec",
              "details": "Thorough functional description",
              "flowchart_mermaid": "graph TD\\nA[\\"Start\\"] --> B{\\"Decision?\\"}",
              "data_fields": [
                { "name": "field_name", "type": "string|number|boolean|date|dropdown|checkbox|radio", "notes": "...", "options": [], "condition": "", "source": "", "isRequired": false, "isEnabled": true }
              ],
              "acceptance_criteria": ["criteria 1", "criteria 2"]
            }
          ]
        }`;

        // --- Mermaid Component ---
        const Mermaid = ({ chart, id }) => {
          const ref = useRef(null);

          useEffect(() => {
            const renderChart = async () => {
              if (!ref.current || !chart) return;
              
              let sanitizedChart = String(chart);
              if (!sanitizedChart.includes('"')) {
                  sanitizedChart = sanitizedChart.replace(/\[([^\]]+)\]/g, '["$1"]');
                  sanitizedChart = sanitizedChart.replace(/\{([^\}]+)\}/g, '{"$1"}');
              }

              try {
                const safeId = `mermaid_diag_${String(id).replace(/[^a-zA-Z0-9]/g, '_')}`;
                if (!window.mermaid) {
                  const script = document.createElement('script');
                  script.src = 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js';
                  script.async = true;
                  script.onload = () => {
                    window.mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose', flowchart: { curve: 'basis', htmlLabels: true } });
                    executeRender(safeId, sanitizedChart);
                  };
                  document.head.appendChild(script);
                } else {
                  executeRender(safeId, sanitizedChart);
                }
              } catch (e) { handleError(); }
            };

            const executeRender = async (safeId, cleanChart) => {
              try {
                if (ref.current) ref.current.innerHTML = '<div class="flex items-center justify-center p-8 animate-pulse text-[10px] text-slate-400 font-bold uppercase tracking-widest"><Loader2 className="animate-spin mr-2" size={12}/> Rendering Architecture...</div>';
                const { svg } = await window.mermaid.render(safeId, cleanChart);
                if (ref.current) ref.current.innerHTML = svg;
              } catch (e) { handleError(); }
            };

            const handleError = () => {
              if (ref.current) {
                ref.current.innerHTML = `<div class="p-8 border border-dashed rounded-3xl text-red-400 text-[10px] font-bold text-center">Flowchart Syntax Error</div>`;
              }
            };
            renderChart();
          }, [chart, id]);

          return <div ref={ref} className="flex justify-center w-full overflow-auto py-4 bg-white rounded-2xl min-h-[200px]" />;
        };

        const App = () => {
          // --- 1. State Management ---
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [view, setView] = useState('login');
          const [dashboardFilter, setDashboardFilter] = useState('active'); 
          const [workspaceTab, setWorkspaceTab] = useState('editor');
          const [showModuleSidebar, setShowModuleSidebar] = useState(true);
          const [projects, setProjects] = useState([]);
          const [currentProjectId, setCurrentProjectId] = useState(null);
          const [newProjectName, setNewProjectName] = useState("");
          const [isCreatingProject, setIsCreatingProject] = useState(false);
          const [editingProjectId, setEditingProjectId] = useState(null);
          const [tempProjectName, setTempProjectName] = useState("");
          const [modules, setModules] = useState([]);
          const [activeModuleId, setActiveModuleId] = useState(null);
          const [isCreatingModule, setIsCreatingModule] = useState(false);
          const [newModuleName, setNewModuleName] = useState("");
          const [editingModuleId, setEditingModuleId] = useState(null);
          const [tempModuleName, setTempModuleName] = useState("");
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);
          const [activeSpecIndex, setActiveSpecIndex] = useState(0);
          const [isEditingBlueprint, setIsEditingBlueprint] = useState(false);
          const [editBuffer, setEditBuffer] = useState(null);
          const [showHistory, setShowHistory] = useState(false);
          const [revisions, setRevisions] = useState([]);
          const [projectHistory, setProjectHistory] = useState([]);
          const [aiRefinementInput, setAiRefinementInput] = useState("");
          const [isAiRefining, setIsAiRefining] = useState(false);
          const [isFlowExplorerOpen, setIsFlowExplorerOpen] = useState(false);
          const [zoomLevel, setZoomLevel] = useState(1);
          
          // BYOK (Bring Your Own Key) State
          const [customApiKey, setCustomApiKey] = useState(() => localStorage.getItem('specscribe_gemini_key') || '');
          const [showApiModal, setShowApiModal] = useState(false);

          const fileInputRef = useRef(null);

          // --- 2. Computed Data ---
          const activeModuleData = (modules || []).find(m => m.id === activeModuleId);
          const currentProjectData = (projects || []).find(p => p.id === currentProjectId);

          // Dynamic Key Resolution
          const getEffectiveApiKey = () => {
              if (isCanvas) return ""; // Let the canvas proxy inject the key
              return customApiKey || GEMINI_API_KEY;
          };

          // --- 3. Helpers ---
          const getUserIdentity = () => String(user?.displayName || user?.email || user?.uid || 'Anonymous');
          const formatDate = (ts) => {
            if (!ts) return '...';
            const date = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
            return date.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
          };
          const sanitizeInput = (text) => text?.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'").replace(/[\u2013\u2014]/g, "-").replace(/\u2026/g, "...").replace(/\u00A0/g, " ").replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F-\x9F]/g, "") || "";

          // --- 4. Audit Engine ---
          const logProjectActivity = async (type, detail) => {
            if (!user || !currentProjectId) return;
            try {
              const historyRef = collection(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', currentProjectId, 'history');
              await addDoc(historyRef, {
                timestamp: serverTimestamp(),
                userName: getUserIdentity(),
                type: String(type),
                detail: String(detail)
              });
            } catch (e) { console.error("Audit Error:", e); }
          };

          const updateModuleData = async (mid, updates, auditType = 'Technical Update') => {
            if (!user || !currentProjectId) return;
            const mRef = doc(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', currentProjectId, 'modules', mid);
            const activeModule = (modules || []).find(m => m.id === mid);
            
            if (updates.result || updates.name || updates.inputText) {
              const before = updates.result ? activeModule?.result : (updates.name ? activeModule?.name : activeModule?.inputText);
              const after = updates.result ? updates.result : (updates.name ? updates.name : updates.inputText);
              
              const historyRef = collection(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', currentProjectId, 'modules', mid, 'revisions');
              await addDoc(historyRef, {
                timestamp: serverTimestamp(),
                userName: getUserIdentity(),
                type: String(auditType),
                before: typeof before === 'object' ? before : String(before || ""),
                after: typeof after === 'object' ? after : String(after || "")
              });
            }

            await updateDoc(mRef, { ...updates, updatedAt: serverTimestamp(), updatedBy: getUserIdentity() });
            await updateDoc(doc(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', currentProjectId), { updatedAt: serverTimestamp(), updatedBy: getUserIdentity() });
          };

          // --- 5. Core Actions ---
          const loginWithGoogle = async () => {
            setError(null);
            const provider = new GoogleAuthProvider();
            try { 
              await signInWithPopup(auth, provider); 
              setView('dashboard');
            } catch (err) { 
              setError("Failed to sign in."); 
            }
          };

          const openProject = (id) => {
            setCurrentProjectId(id);
            setActiveModuleId(null);
            setView('workspace');
            setWorkspaceTab('editor');
            setIsEditingBlueprint(false);
            setActiveSpecIndex(0);
            setError(null);
          };

          const createProject = async () => {
            if (!newProjectName.trim() || !user) return;
            const name = newProjectName.trim();
            if ((projects || []).some(p => !p.isDeleted && String(p.name || "").toLowerCase() === name.toLowerCase())) {
                setError("Duplicate project name."); return;
            }
            const id = crypto.randomUUID();
            try {
              await setDoc(doc(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', id), { name, createdAt: new Date().toISOString(), updatedAt: serverTimestamp(), createdBy: getUserIdentity(), updatedBy: getUserIdentity(), isDeleted: false, status: 'active' });
              setNewProjectName(""); setIsCreatingProject(false); openProject(id);
            } catch (err) { setError("Failed to create project."); }
          };

          const createModule = async () => {
            if (!newModuleName.trim() || !user || !currentProjectId) return;
            const id = crypto.randomUUID();
            const name = newModuleName.trim();
            try {
              await setDoc(doc(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', currentProjectId, 'modules', id), { name, createdAt: serverTimestamp(), updatedAt: serverTimestamp(), createdBy: getUserIdentity(), updatedBy: getUserIdentity(), inputText: "", result: null, fileName: "" });
              await logProjectActivity('Module Created', `Added module: ${name}`);
              setNewModuleName(""); setIsCreatingModule(false); setActiveModuleId(id); setWorkspaceTab('editor');
            } catch (err) { setError("Failed to create module."); }
          };

          const deleteModule = async (moduleId, e) => {
            if (e) e.stopPropagation();
            if (!user || !currentProjectId) return;
            const m = (modules || []).find(item => item.id === moduleId);
            try {
              await logProjectActivity('Module Deleted', `Deleted module: ${m?.name || moduleId}`);
              await deleteDoc(doc(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', currentProjectId, 'modules', moduleId));
              if (activeModuleId === moduleId) setActiveModuleId(null);
            } catch (err) { setError("Failed to delete module."); }
          };

          const saveProjectName = async (id) => {
            if (!tempProjectName.trim()) { setEditingProjectId(null); return; }
            await logProjectActivity('Project Renamed', `Changed project name to: ${tempProjectName}`);
            await updateDoc(doc(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', id), { name: tempProjectName.trim(), updatedAt: serverTimestamp(), updatedBy: getUserIdentity() });
            setEditingProjectId(null);
          };

          const saveModuleName = async (moduleId) => {
            if (!tempModuleName.trim()) { setEditingModuleId(null); return; }
            await updateModuleData(moduleId, { name: tempModuleName.trim() }, 'Module Renamed');
            setEditingModuleId(null);
          };

          const softDeleteProject = async (id, e) => {
            if (e) e.stopPropagation();
            if (!user) return;
            try { await updateDoc(doc(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', id), { isDeleted: true, deletedAt: serverTimestamp(), deletedBy: getUserIdentity() }); } catch (err) { setError("Failed to move to bin."); }
          };

          const restoreProject = async (id, e) => {
            if (e) e.stopPropagation();
            if (!user) return;
            try { await updateDoc(doc(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', id), { isDeleted: false, deletedAt: null }); } catch (err) { setError("Failed to restore."); }
          };

          const hardDeleteProject = async (id, e) => {
            if (e) e.stopPropagation();
            if (!user) return;
            try { await deleteDoc(doc(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', id)); } catch (err) { setError("Failed to delete permanently."); }
          };

          const startEditingBlueprint = () => {
            if (activeModuleData?.result) {
                setEditBuffer(JSON.parse(JSON.stringify(activeModuleData.result)));
                setIsEditingBlueprint(true);
            }
          };

          const saveBlueprintChanges = async () => {
            if (!editBuffer) return;
            await updateModuleData(activeModuleId, { result: editBuffer }, 'Manual Blueprint Edit');
            setIsEditingBlueprint(false);
            setEditBuffer(null);
          };

          // --- 6. AI Spec Generation ---
          const generateSpecs = async () => {
            if (!activeModuleData || !activeModuleData.inputText.trim()) return;
            
            const keyToUse = getEffectiveApiKey();
            if (!isCanvas && !keyToUse) {
                setShowApiModal(true);
                return;
            }

            setLoading(true); setError(null);

            const callAiWithRetry = async (attempt = 0) => {
              try {
                const promptContext = `MODULE CONTEXT: Analyzing "${activeModuleData.name}". Extract technical requirements strictly for this scope. Text: ${sanitizeInput(activeModuleData.inputText)}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${keyToUse}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ 
                    contents: [{ parts: [{ text: promptContext }] }], 
                    systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }, 
                    generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
                  })
                });

                if (!response.ok) {
                  if ((response.status === 429 || response.status >= 500) && attempt < 5) {
                    const delay = Math.pow(2, attempt) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                    return callAiWithRetry(attempt + 1);
                  }
                  if (response.status === 400 || response.status === 403 || response.status === 404) {
                      setShowApiModal(true);
                      throw new Error("API Key or Model invalid. Please provide a valid Gemini API key.");
                  }
                  throw new Error(`AI Gateway Error (${response.status})`);
                }

                const data = await response.json();
                const rawContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                const match = rawContent?.match(/\{[\s\S]*\}/);
                
                if (match) {
                  await updateModuleData(activeModuleId, { result: JSON.parse(match[0]) }, 'Deep AI Scribed');
                  setActiveSpecIndex(0); 
                  setWorkspaceTab('blueprint');
                } else {
                  throw new Error("AI output was not in the correct JSON format.");
                }
              } catch (err) {
                if (attempt < 5 && !err.message.includes("API Key")) {
                  const delay = Math.pow(2, attempt) * 1000;
                  await new Promise(r => setTimeout(r, delay));
                  return callAiWithRetry(attempt + 1);
                }
                throw err;
              }
            };

            try {
              await callAiWithRetry();
            } catch (err) {
              setError(err.message || "Deep Scribe failed. Ensure the input text is not excessively large.");
            } finally {
              setLoading(false);
            }
          };

          const syncWithAi = async () => {
            if (!editBuffer) return;
            const keyToUse = getEffectiveApiKey();
            if (!isCanvas && !keyToUse) {
                setShowApiModal(true);
                return;
            }

            setIsAiRefining(true);
            try {
              const currentSpec = editBuffer.specs?.[activeSpecIndex];
              if (!currentSpec) return;
              const prompt = `DEEP ANALYSIS: Refine JSON logic for the module. Context: ${currentSpec.details}`;
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${keyToUse}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" }})
              });
              if (!res.ok) throw new Error("API Request Failed");
              const data = await res.json();
              const match = data.candidates?.[0]?.content?.parts?.[0]?.text?.match(/\{[\s\S]*\}/);
              if (match) {
                const synced = JSON.parse(match[0]);
                const newBuffer = {...editBuffer};
                newBuffer.specs[activeSpecIndex].data_fields = synced.data_fields || [];
                newBuffer.specs[activeSpecIndex].acceptance_criteria = synced.acceptance_criteria || [];
                newBuffer.specs[activeSpecIndex].flowchart_mermaid = synced.flowchart_mermaid || currentSpec.flowchart_mermaid;
                setEditBuffer(newBuffer);
              }
            } catch (err) { console.error(err); } finally { setIsAiRefining(false); }
          };

          const refineAiSpec = async () => {
            if (!aiRefinementInput.trim() || !editBuffer) return;
            const keyToUse = getEffectiveApiKey();
            if (!isCanvas && !keyToUse) {
                setShowApiModal(true);
                return;
            }

            setIsAiRefining(true);
            try {
              const currentSpec = editBuffer.specs?.[activeSpecIndex];
              if (!currentSpec) return;
              const prompt = `Refine this functional specification: "${aiRefinementInput}". Return ONLY the refined text. Original: ${currentSpec.details}`;
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${keyToUse}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
              });
              if (!res.ok) throw new Error("API Request Failed");
              const data = await res.json();
              const refined = data.candidates?.[0]?.content?.parts?.[0]?.text;
              if (refined) {
                const newBuffer = {...editBuffer};
                newBuffer.specs[activeSpecIndex].details = String(refined);
                setEditBuffer(newBuffer);
                setAiRefinementInput("");
              }
            } catch (err) { console.error(err); } finally { setIsAiRefining(false); }
          };

          const updateEditSpec = (field, val) => {
            const newBuffer = {...editBuffer};
            if (newBuffer.specs?.[activeSpecIndex]) {
                newBuffer.specs[activeSpecIndex][field] = val;
                setEditBuffer(newBuffer);
            }
          };

          // --- 7. File Import Pipeline ---
          const loadMammoth = () => new Promise((resolve, reject) => {
            if (window.mammoth) return resolve(window.mammoth);
            const script = document.createElement('script');
            script.src = "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js";
            script.onload = () => resolve(window.mammoth);
            script.onerror = () => reject(new Error("Word library failed to load."));
            document.head.appendChild(script);
          });

          const handleFileUpload = async (event) => {
            const file = event.target.files?.[0];
            if (!file || !activeModuleId || !user) return;
            setLoading(true); setError(null);
            try {
              const isDocx = file.name.toLowerCase().endsWith('.docx');
              let content = "";
              if (isDocx) {
                await loadMammoth();
                const arrayBuffer = await new Promise((res, rej) => {
                  const reader = new FileReader();
                  reader.onload = () => res(reader.result);
                  reader.onerror = rej;
                  reader.readAsArrayBuffer(file);
                });
                const result = await window.mammoth.extractRawText({ arrayBuffer });
                content = result.value;
              } else {
                content = await new Promise((res, rej) => {
                  const reader = new FileReader();
                  reader.onload = () => res(reader.result);
                  reader.onerror = rej;
                  reader.readAsText(file);
                });
              }
              await updateModuleData(activeModuleId, { inputText: sanitizeInput(content), fileName: file.name }, 'Document Imported');
            } catch (err) { setError("Import failed: " + err.message); } finally { setLoading(false); if (fileInputRef.current) fileInputRef.current.value = ""; }
          };

          // --- 8. Auth & Sync Lifecycle ---
          useEffect(() => {
            const initAuth = async () => {
              try {
                if (isCanvas) {
                  // In Canvas preview, we must auto-login to bypass cross-origin popups
                  if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                      await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (e) {
                      await signInAnonymously(auth);
                    }
                  } else {
                    await signInAnonymously(auth);
                  }
                }
                // On GitHub (!isCanvas), we do NOT anonymously login. We wait for user to click Google Sign In.
              } catch (err) { 
                console.error("Auth failed:", err); 
                setError("Authentication check failed.");
              } finally { 
                setAuthLoading(false); 
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              if (currentUser) {
                setView(prev => prev === 'login' ? 'dashboard' : prev);
              } else {
                setView('login');
              }
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const projectsRef = collection(db, 'artifacts', activeAppId, 'users', user.uid, 'projects');
            return onSnapshot(projectsRef, (snapshot) => {
              const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setProjects(list.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0)));
            });
          }, [user]);

          useEffect(() => {
            if (!user || !currentProjectId) return;
            const modulesRef = collection(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', currentProjectId, 'modules');
            const pHistoryRef = collection(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', currentProjectId, 'history');
            
            const unsubModules = onSnapshot(modulesRef, (snapshot) => {
              const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setModules(list.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0)));
            });

            const unsubHistory = onSnapshot(pHistoryRef, (snapshot) => {
                const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                setProjectHistory(list.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
            });

            return () => { unsubModules(); unsubHistory(); };
          }, [user, currentProjectId]);

          useEffect(() => {
            if (!user || !currentProjectId || !activeModuleId) { setRevisions([]); return; }
            const historyRef = collection(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', currentProjectId, 'modules', activeModuleId, 'revisions');
            return onSnapshot(historyRef, (snapshot) => {
              const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setRevisions(list.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
            });
          }, [user, currentProjectId, activeModuleId]);

          const detectChanges = (before, after) => {
            const changes = [];
            if (!before || !after) return [];
            
            if (typeof before === 'string' && typeof after === 'string' && before !== after) {
                changes.push({ section: "Source Document", type: "modified", field: "Text Content", from: before, to: after });
                return changes;
            }

            if (before.project_summary !== after.project_summary) {
                changes.push({ section: "Project", type: "modified", field: "Summary", from: before.project_summary, to: after.project_summary });
            }

            if (after.specs) {
                const bSpecs = before.specs || [];
                const aSpecs = after.specs || [];

                aSpecs.forEach((aS, idx) => {
                    const bS = bSpecs.find(b => b.id === aS.id) || bSpecs[idx];
                    const specName = aS.feature_name || 'Feature Spec';
                    
                    if (!bS) { 
                        changes.push({ section: String(specName), type: 'added', field: "Specification", from: "None", to: "Created new feature" }); 
                        return; 
                    }

                    if (bS.feature_name !== aS.feature_name) changes.push({ section: String(specName), type: "modified", field: "Feature Name", from: bS.feature_name, to: aS.feature_name });
                    if (bS.details !== aS.details) changes.push({ section: String(specName), type: "modified", field: "Functional Details", from: bS.details, to: aS.details });
                    if (bS.flowchart_mermaid !== aS.flowchart_mermaid) changes.push({ section: String(specName), type: "modified", field: "Process Flowchart", from: bS.flowchart_mermaid, to: aS.flowchart_mermaid });
                    
                    if (JSON.stringify(bS.acceptance_criteria) !== JSON.stringify(aS.acceptance_criteria)) {
                        changes.push({ section: String(specName), type: "modified", field: "Acceptance Criteria", from: JSON.stringify(bS.acceptance_criteria || []), to: JSON.stringify(aS.acceptance_criteria || []) });
                    }

                    const bFields = bS.data_fields || [];
                    const aFields = aS.data_fields || [];
                    
                    aFields.forEach((aF, fIdx) => {
                        const bF = bFields.find(f => f.name === aF.name) || bFields[fIdx];
                        if (!bF) {
                            changes.push({ section: String(specName), type: "added", field: `Data Field: ${aF.name}`, from: "None", to: JSON.stringify(aF) });
                            return;
                        }
                        
                        ['name', 'type', 'notes', 'condition', 'source', 'isRequired', 'isEnabled'].forEach(prop => {
                            if (bF[prop] !== aF[prop]) {
                                changes.push({ section: String(specName), type: "modified", field: `Field [${aF.name}] - ${prop}`, from: String(bF[prop]), to: String(aF[prop]) });
                            }
                        });

                        if (JSON.stringify(bF.options) !== JSON.stringify(aF.options)) {
                            changes.push({ section: String(specName), type: "modified", field: `Field [${aF.name}] - options`, from: String(bF.options || []), to: String(aF.options || []) });
                        }
                    });
                    
                    bFields.forEach(bF => {
                        if (!aFields.find(f => f.name === bF.name)) {
                            changes.push({ section: String(specName), type: "removed", field: `Data Field: ${bF.name}`, from: JSON.stringify(bF), to: "Deleted" });
                        }
                    });
                });

                bSpecs.forEach(bS => {
                    if (!aSpecs.find(a => a.id === bS.id)) {
                        changes.push({ section: String(bS.feature_name || 'Spec'), type: 'removed', field: "Specification", from: "Existing feature", to: "Deleted" });
                    }
                });
            }
            return changes;
          };

          if (authLoading) return <div className="h-screen flex items-center justify-center bg-slate-50 text-indigo-600"><Loader2 className="animate-spin" /></div>;

          if (view === 'login') {
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 font-sans">
                    <div className="bg-white max-w-md w-full rounded-[2.5rem] shadow-xl p-12 text-center animate-in zoom-in-95 duration-500 border border-slate-100">
                        <div className="mx-auto w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-lg shadow-indigo-200 mb-8 text-white transform -rotate-3">
                            <Settings size={40} className="transform rotate-3" />
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 tracking-tighter mb-3">SpecScribe</h1>
                        <p className="text-slate-500 text-sm mb-10 leading-relaxed px-4">
                            Securely access your workspace to generate, manage, and refine system architectural blueprints.
                        </p>
                        
                        <button 
                            onClick={loginWithGoogle} 
                            className="w-full bg-white border-2 border-slate-200 hover:border-indigo-600 hover:bg-indigo-50 text-slate-700 font-bold py-3.5 px-4 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-sm"
                        >
                            <svg className="w-5 h-5" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Continue with Google
                        </button>

                        {error && <div className="mt-6 p-3 bg-red-50 border border-red-100 rounded-xl text-red-600 text-xs font-bold flex items-center justify-center gap-2"><AlertCircle size={16} /> {String(error)}</div>}
                    </div>
                </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans flex flex-col text-sm">
              {/* API KEY MODAL */}
              {showApiModal && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300 px-4">
                   <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full animate-in zoom-in-95">
                      <div className="flex items-center gap-3 mb-4 text-indigo-600">
                        <Key size={24} />
                        <h3 className="text-lg font-black tracking-tight text-slate-800">Set Gemini API Key</h3>
                      </div>
                      <p className="text-xs text-slate-500 mb-6 leading-relaxed">
                        To use SpecScribe on this public deployment, please provide your own Google Gemini Developer API Key. 
                        <br/><br/>
                        <strong className="text-amber-600">Security Note:</strong> Your key is securely stored in your browser's local storage and is never sent to our servers.
                      </p>
                      <input 
                        type="password" 
                        value={customApiKey} 
                        onChange={e => setCustomApiKey(e.target.value)} 
                        className="w-full border border-slate-200 focus:border-indigo-500 bg-slate-50 p-3 rounded-xl mb-6 outline-none shadow-inner text-sm" 
                        placeholder="AIzaSy..." 
                      />
                      <div className="flex justify-end gap-3">
                         <button onClick={() => setShowApiModal(false)} className="px-5 py-2.5 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors text-xs">Cancel</button>
                         <button 
                            onClick={() => { localStorage.setItem('specscribe_gemini_key', customApiKey); setShowApiModal(false); }} 
                            className="px-5 py-2.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-all flex items-center gap-2 text-xs"
                         >
                            <Save size={14} /> Save Key
                         </button>
                      </div>
                   </div>
                </div>
              )}

              {view === 'dashboard' ? (
                <div className="max-w-6xl mx-auto p-8 w-full animate-in fade-in duration-500 text-slate-800 text-xs">
                  <header className="flex justify-between items-center mb-12">
                    <div>
                      <div className="flex items-center gap-3 mb-2 text-slate-800">
                        <div className="p-2 bg-indigo-600 rounded-lg shadow-lg text-white"><Settings className="text-white" size={20} /></div>
                        <h1 className="text-2xl font-black tracking-tighter text-slate-800">SpecScribe</h1>
                      </div>
                      <p className="text-slate-500 text-xs uppercase font-bold tracking-widest opacity-60">System Architectural Scribing</p>
                    </div>
                    <div className="flex items-center gap-3">
                      {!isCanvas && (
                        <button onClick={() => setShowApiModal(true)} className="flex items-center gap-2 bg-white px-4 py-2 rounded-xl font-bold border border-slate-200 shadow-sm text-xs text-slate-700 hover:bg-slate-50 transition-all">
                          <Key size={14} className={customApiKey ? "text-emerald-500" : "text-amber-500"} /> {customApiKey ? 'Key Set' : 'Set API Key'}
                        </button>
                      )}
                      {user && (
                        <div className="flex items-center gap-3 bg-white p-2 px-4 rounded-xl border border-slate-200 shadow-sm">
                          {user.photoURL ? <img src={user.photoURL} className="w-8 h-8 rounded-full" alt="" /> : <UserIcon size={14} />}
                          <div className="hidden sm:block font-bold text-[10px] text-slate-700 leading-tight">
                            <p>{String(user.displayName || 'Architect')}</p>
                            <p className="text-slate-400 mt-1">{String(user.email || '')}</p>
                          </div>
                          <button onClick={async () => { await signOut(auth); setView('login'); }} className="p-1.5 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-lg transition-colors"><LogOut size={14} /></button>
                        </div>
                      )}
                    </div>
                  </header>

                  <div className="flex justify-between items-center mb-8 h-12">
                    <div className="bg-slate-100 p-1 rounded-xl flex shadow-inner">
                      <button onClick={() => setDashboardFilter('active')} className={`px-5 py-2 rounded-lg text-xs font-bold transition-all ${dashboardFilter === 'active' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>Projects</button>
                      <button onClick={() => setDashboardFilter('trash')} className={`px-5 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2 ${dashboardFilter === 'trash' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}><Trash2 size={12} /> Bin</button>
                    </div>
                    {!isCreatingProject && dashboardFilter === 'active' && (
                      <button onClick={() => setIsCreatingProject(true)} className="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold shadow-lg text-xs hover:bg-indigo-700 transition-all"><Plus size={14} /> New Project</button>
                    )}
                    {isCreatingProject && (
                      <div className="flex gap-2 animate-in slide-in-from-right-2">
                        <input type="text" autoFocus value={newProjectName} onChange={(e) => { setNewProjectName(e.target.value); setError(null); }} onKeyDown={(e) => e.key === 'Enter' && createProject()} className={`border ${error ? 'border-red-300' : 'border-indigo-100'} rounded-xl px-4 py-2 outline-none text-xs w-48 bg-white shadow-inner text-slate-800`} placeholder="Project Name" />
                        <button onClick={createProject} className="bg-indigo-600 text-white p-2 rounded-lg hover:bg-indigo-700 shadow-md transition-all"><CheckCircle size={16} /></button>
                        <button onClick={() => setIsCreatingProject(false)} className="bg-slate-200 text-slate-600 p-2 rounded-lg hover:bg-slate-300 transition-all"><X size={16} /></button>
                      </div>
                    )}
                  </div>

                  {error && <div className="mb-6 p-3 bg-red-50 border border-red-100 rounded-xl text-red-600 text-[10px] font-bold flex items-center gap-2 animate-in slide-in-from-top-2"><AlertCircle size={14} /> {String(error)}</div>}

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {(projects || []).filter(p => dashboardFilter === 'trash' ? p.isDeleted : !p.isDeleted).map(p => (
                      <div key={p.id} onClick={() => !p.isDeleted && openProject(p.id)} className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm transition-all flex flex-col justify-between cursor-pointer hover:shadow-xl hover:border-indigo-200 text-slate-800">
                        <div className="relative">
                          <div className="flex justify-between items-start mb-4">
                            <div className={`p-2 rounded-lg bg-slate-50 text-slate-400 group-hover:text-indigo-500 transition-colors`}><Folder size={24} /></div>
                            <div className="flex gap-1">
                              {p.isDeleted ? (
                                <button onClick={(e) => { e.stopPropagation(); updateDoc(doc(db, 'artifacts', activeAppId, 'users', user.uid, 'projects', p.id), { isDeleted: false }); }} className="p-1.5 text-slate-300 hover:text-emerald-500 hover:bg-emerald-50 rounded-lg transition-all"><RotateCcw size={14} /></button>
                              ) : (
                                <>
                                  <button onClick={(e) => { e.stopPropagation(); setEditingProjectId(p.id); setTempProjectName(String(p.name)); }} className="p-1.5 text-slate-300 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors"><Edit3 size={14} /></button>
                                  <button onClick={(e) => { e.stopPropagation(); softDeleteProject(p.id, e); }} className="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={14} /></button>
                                </>
                              )}
                            </div>
                          </div>
                          {editingProjectId === p.id ? (
                            <div onClick={e => e.stopPropagation()}><input autoFocus value={tempProjectName} onChange={(e) => setTempProjectName(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') saveProjectName(p.id); if (e.key === 'Escape') setEditingProjectId(null); }} className="w-full bg-slate-50 border border-indigo-200 rounded-lg px-3 py-1.5 text-[11px] font-bold outline-none shadow-inner" /></div>
                          ) : (
                            <>
                              <h3 className="text-sm font-bold truncate">{String(p.name)}</h3>
                              <p className="text-[9px] text-slate-400 mt-2 font-black tracking-wider flex items-center gap-1 uppercase opacity-70"><History size={8} /> {formatDate(p.updatedAt)}</p>
                            </>
                          )}
                        </div>
                        {!p.isDeleted && !editingProjectId && <span className="text-indigo-600 font-bold text-[10px] mt-6 flex items-center gap-1 group-hover:gap-2 transition-all uppercase tracking-widest font-mono">Open Workspace <ChevronRight size={12} /></span>}
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                /* Workspace View */
                <div className="flex flex-col h-screen overflow-hidden text-slate-800">
                  <nav className="bg-white border-b border-slate-200 px-6 py-2 flex items-center justify-between shadow-sm z-20 shrink-0">
                    <div className="flex items-center gap-4 text-slate-800">
                      <button onClick={() => setView('dashboard')} className="p-1.5 hover:bg-slate-100 rounded-lg transition-colors"><ChevronLeft size={20} /></button>
                      <div className="h-6 w-[1px] bg-slate-200"></div>
                      <div>
                        <h2 className="text-xs font-bold flex items-center gap-2"><Folder className="text-indigo-600" size={12} /> {String(currentProjectData?.name || 'Project')}</h2>
                        <p className="text-[8px] font-black uppercase text-indigo-500 tracking-tighter opacity-70">{String(activeModuleData?.name || 'Module')}</p>
                      </div>
                    </div>
                    <div className="flex bg-slate-100 p-0.5 rounded-lg shadow-inner">
                      <button onClick={() => setWorkspaceTab('editor')} className={`flex items-center gap-2 px-4 py-1.5 text-[10px] font-bold rounded-md transition-all ${workspaceTab === 'editor' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Edit3 size={12} /> Editor</button>
                      <button disabled={!activeModuleData?.result} onClick={() => setWorkspaceTab('blueprint')} className={`flex items-center gap-2 px-4 py-1.5 text-[10px] font-bold rounded-md transition-all ${workspaceTab === 'blueprint' ? 'bg-white text-indigo-600 shadow-sm' : activeModuleData?.result ? 'text-slate-500 hover:text-slate-700' : 'text-slate-200'}`}><Eye size={12} /> Blueprint</button>
                    </div>
                  </nav>

                  <div className="flex flex-1 overflow-hidden">
                    {showModuleSidebar && (
                      <aside className="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm text-xs text-slate-700">
                        <div className="p-4 border-b border-slate-100 flex justify-between items-center text-slate-400">
                          <h3 className="text-[8px] font-black uppercase tracking-[0.2em] flex items-center gap-1.5"><Layers size={10} /> Modules</h3>
                          <button onClick={() => setIsCreatingModule(true)} className="p-1 hover:bg-indigo-50 text-indigo-600 rounded-lg transition-colors shadow-sm"><Plus size={16} /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-2 space-y-0.5 scrollbar-hide">
                          {isCreatingModule && (
                            <div className="p-2 bg-indigo-50 rounded-xl mb-3 border border-indigo-100 animate-in slide-in-from-top-2">
                              <input type="text" autoFocus value={newModuleName} onChange={(e) => setNewModuleName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && createModule()} className="w-full bg-white border border-indigo-200 rounded-lg px-3 py-1.5 text-[10px] outline-none mb-2 shadow-inner text-slate-800" placeholder="Module Name" />
                              <div className="flex gap-2"><button onClick={createModule} className="flex-1 bg-indigo-600 text-white text-[9px] font-bold py-1.5 rounded-lg shadow-sm">Add</button><button onClick={() => setIsCreatingModule(false)} className="bg-slate-200 text-slate-600 p-1.5 rounded-lg hover:bg-slate-300 transition-colors"><X size={12} /></button></div>
                            </div>
                          )}
                          {(modules || []).map(m => (
                            <div key={m.id} onClick={() => { setActiveModuleId(m.id); setWorkspaceTab(m.result ? 'blueprint' : 'editor'); }} className={`group flex items-center justify-between p-2.5 rounded-xl cursor-pointer transition-all ${activeModuleId === m.id ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100/50' : 'hover:bg-slate-50 text-slate-500'}`}>
                              <div className="flex items-center gap-2 truncate flex-1 text-slate-700 text-xs">
                                <div className={`w-2.5 h-2.5 rounded-full shrink-0 ${m.result ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.3)]' : 'bg-slate-300'}`}></div>
                                <div className="truncate flex-1">
                                  {editingModuleId === m.id ? (
                                    <input autoFocus value={tempModuleName} onClick={(e) => e.stopPropagation()} onChange={(e) => setTempModuleName(e.target.value)} onBlur={() => saveModuleName(m.id)} onKeyDown={(e) => { if (e.key === 'Enter') saveModuleName(m.id); if (e.key === 'Escape') setEditingModuleId(null); }} className="w-full bg-white border border-indigo-300 rounded px-1 py-0 text-[11px] outline-none shadow-inner text-slate-800" />
                                  ) : (
                                    <>
                                      <span className="text-[11px] font-bold block truncate">{String(m.name || 'Module')}</span>
                                      <p className="text-[8px] opacity-60 uppercase font-bold tracking-tighter">By {String(m.updatedBy || 'System')}</p>
                                    </>
                                  )}
                                </div>
                              </div>
                              <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-all shrink-0">
                                <button onClick={(e) => { e.stopPropagation(); setEditingModuleId(m.id); setTempModuleName(String(m.name)); }} className="p-1 hover:text-indigo-600 hover:bg-indigo-100 rounded-md transition-colors"><Edit3 size={10} /></button>
                                <button onClick={(e) => deleteModule(m.id, e)} className="p-1 hover:text-red-500 hover:bg-red-100 rounded-md transition-colors"><Trash size={10} /></button>
                              </div>
                            </div>
                          ))}
                        </div>
                        <div className="p-4 bg-slate-50 border-t border-slate-200 space-y-3 shrink-0">
                          <div className="flex items-center justify-between gap-2 text-[8px] font-black uppercase text-slate-400 tracking-widest">
                             <span className="flex items-center gap-1.5"><Activity size={10} /> Global Audit Log</span>
                             <button onClick={() => setShowHistory(true)} className="text-indigo-600 hover:underline font-bold">View</button>
                          </div>
                          <div className="relative pl-4 border-l border-indigo-200 ml-1">
                            <p className="text-[8px] font-bold uppercase">Synchronized</p>
                            <p className="text-[9px] font-bold text-slate-800 truncate">{getUserIdentity()}</p>
                          </div>
                        </div>
                      </aside>
                    )}

                    <main className="flex-1 overflow-auto bg-slate-50 p-6">
                      {!activeModuleId ? (
                        <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-50 animate-pulse"><Layers size={40} className="mb-4" /><p className="font-bold uppercase tracking-widest text-[10px]">Select a requirement module to begin.</p></div>
                      ) : workspaceTab === 'editor' ? (
                        <div className="max-w-4xl mx-auto h-full flex flex-col space-y-4">
                          <div className="bg-white rounded-3xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden animate-in slide-in-from-bottom-4">
                            <div className="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center shrink-0">
                              <div className="flex items-center gap-3">
                                <div className="p-2 bg-indigo-50 rounded-xl text-indigo-600 shadow-sm"><FileText size={16} /></div>
                                <div><h3 className="text-sm font-bold text-slate-800">{activeModuleData?.name || 'Requirements'}</h3><p className="text-[9px] text-slate-400">Deep functional scribing focus.</p></div>
                              </div>
                              <div className="flex gap-2">
                                <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept=".txt,.md,.json,.csv,.docx" />
                                <button onClick={() => fileInputRef.current.click()} disabled={loading} className="flex items-center gap-2 bg-white border border-slate-200 px-4 py-1.5 rounded-xl text-[10px] font-bold hover:bg-slate-50 shadow-sm transition-all disabled:opacity-50"><FileUp size={12} /> Import Doc</button>
                              </div>
                            </div>
                            <div className="p-6 flex-1 flex flex-col overflow-hidden">
                              {activeModuleData?.fileName && (
                                <div className="mb-4 bg-indigo-50 p-3 rounded-xl flex justify-between items-center border border-indigo-100 animate-in zoom-in duration-200 shadow-sm">

                                  <button onClick={() => updateModuleData(activeModuleId, { fileName: "", inputText: "" }, 'Import Cleared')} className="text-indigo-400 hover:text-indigo-600"><X size={16} /></button>
                                </div>

                              <textarea value={activeModuleData?.inputText || ""} onChange={(e) => updateModuleData(activeModuleId, { inputText: e.target.value }, 'Manual Text Edit')} placeholder="Scribe requirements here... Logical rules and data fields should be detailed for the AI." className="flex-1 w-full p-6 bg-slate-50 border border-slate-200 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-600/5 text-sm leading-relaxed shadow-inner placeholder:text-slate-300 transition-all resize-none font-sans text-slate-700" />
                              <div className="mt-4 flex justify-between items-center shrink-0">
                                <div className="flex flex-col"><p className="text-[8px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1"><History size={10} /> Deep AI Ready</p></div>
                                <button onClick={generateSpecs} disabled={loading || !activeModuleData?.inputText?.trim()} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-2.5 rounded-2xl shadow-xl shadow-indigo-100 transition-all flex items-center gap-2 text-xs">
                                  {loading ? <Loader2 className="animate-spin" size={14} /> : <><Send size={14} /> Scribe Blueprint</>}
                                </button>
                              </div>
                            </div>
                          </div>
                          {error && <div className="p-4 bg-red-50 border border-red-200 text-red-600 rounded-2xl flex items-center gap-3 animate-in shake font-bold"><AlertCircle size={18} /> <p className="text-xs">{String(error)}</p></div>}
                        </div>
                      ) : (
                        /* Blueprint View */
                        activeModuleData?.result && (
                          <div className="max-w-6xl mx-auto space-y-6 animate-in fade-in duration-500 text-slate-700 text-xs">
                            <div className="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                              <div className="bg-indigo-600 p-6 text-white relative overflow-hidden shrink-0 shadow-lg text-xs">
                                <div className="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                  <div className="flex-1">
                                    <div className="flex items-center gap-3 mb-2">
                                      <span className="px-2 py-0.5 bg-indigo-500 rounded-lg text-[8px] font-black uppercase tracking-widest shadow-sm">{activeModuleData.name} Blueprint</span>
                                      <button onClick={() => setShowHistory(true)} className="px-2 py-0.5 bg-indigo-700/50 hover:bg-indigo-700 rounded-lg text-[8px] font-black uppercase tracking-widest flex items-center gap-1.5 transition-all font-mono shadow-sm"><History size={10} /> History</button>
                                    </div>
                                    <h2 className="text-xl font-black tracking-tight mb-2">Technical Specification</h2>
                                    <p className="text-indigo-100 text-[10px] max-w-3xl leading-normal font-medium opacity-80">{activeModuleData.result.project_summary || "Functional Analysis Summary"}</p>
                                  </div>
                                  {!isEditingBlueprint ? (
                                    <button onClick={startEditingBlueprint} className="bg-white/10 hover:bg-white text-white hover:text-indigo-600 px-6 py-2 rounded-xl text-[10px] font-bold transition-all flex items-center gap-2 border border-white/20 shadow-lg"><Edit3 size={14} /> Update Specs</button>

                                    <div className="flex gap-2">

                                    <TableIcon size={12} className="text-indigo-500" />
                                    <h3 className="text-[9px] font-black uppercase tracking-widest text-slate-500">Major Specifications Index</h3>
                                  </div>
                                  <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse text-slate-700">
                                      <thead className="bg-slate-100/50 text-[8px] font-black uppercase text-slate-400">
                                        <tr>
                                          <th className="px-4 py-2 tracking-wider text-center">#</th>
                                          <th className="px-4 py-2 tracking-wider text-left">Major Spec</th>
                                          <th className="px-4 py-2 tracking-wider text-center">Fields</th>
                                          <th className="px-4 py-2 tracking-wider text-center">AC</th>
                                        </tr>
                                      </thead>
                                      <tbody className="divide-y divide-slate-100">
                                        {((isEditingBlueprint ? editBuffer : activeModuleData.result)?.specs || []).map((s, idx) => (
                                          <tr key={idx} onClick={() => setActiveSpecIndex(idx)} className={`cursor-pointer transition-all ${activeSpecIndex === idx ? 'bg-indigo-50/80 font-bold' : 'hover:bg-white'}`}>
                                            <td className={`px-4 py-2.5 text-[10px] font-mono text-center ${activeSpecIndex === idx ? 'text-indigo-600' : 'text-slate-400'}`}>{idx + 1}</td>
                                            <td className={`px-4 py-2.5 text-[11px] ${activeSpecIndex === idx ? 'text-indigo-700' : ''}`}>{String(s.feature_name || 'Module')}</td>
                                            <td className="px-4 py-2.5 text-center"><span className="text-[8px] font-black bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded border border-slate-300 shadow-sm">{s.data_fields?.length || 0}</span></td>
                                            <td className="px-4 py-2.5 text-center"><span className="text-[8px] font-black bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded border border-slate-300 shadow-sm">{s.acceptance_criteria?.length || 0}</span></td>
                                          </tr>
                                        ))}
                                      </tbody>
                                    </table>
                                  </div>
                                </div>

                                <div className="mb-10 animate-in slide-in-from-bottom-2">
                                   <div className="flex items-center justify-between mb-4">
                                      <h3 className="text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-3 text-slate-400 border-l-4 border-amber-500 pl-4">Process Architecture</h3>
                                      <button onClick={() => setIsFlowExplorerOpen(true)} className="flex items-center gap-1.5 px-3 py-1 bg-white border border-slate-200 rounded-lg text-[9px] font-black uppercase text-indigo-600 hover:bg-slate-50 transition-all shadow-sm"><Maximize2 size={12} /> Explore Flowchart</button>
                                   </div>
                                   <div className="p-4 bg-white border border-slate-200 rounded-3xl shadow-inner min-h-[300px] flex items-center justify-center">
                                      { (isEditingBlueprint ? editBuffer : activeModuleData.result)?.specs?.[activeSpecIndex] ? (
                                        <Mermaid id={`main-flow-${activeSpecIndex}`} chart={(isEditingBlueprint ? editBuffer : activeModuleData.result).specs[activeSpecIndex].flowchart_mermaid || 'graph TD\\n  Start["No logic mapped"]'} />
                                      ) : (
                                        <div className="text-slate-300 italic text-[10px]">No logic mapped yet.</div>
                                      )}
                                   </div>
                                </div>

                                {isEditingBlueprint && editBuffer?.specs?.[activeSpecIndex] ? (
                                  <div className="space-y-8 animate-in zoom-in-95 duration-300 text-slate-700">
                                     <div className="space-y-3">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-amber-600"><GitBranch size={12} /> Flowchart Logic (Mermaid)</h3>
                                        <textarea value={editBuffer.specs[activeSpecIndex].flowchart_mermaid || ""} onChange={(e) => updateEditSpec('flowchart_mermaid', e.target.value)} className="w-full h-32 p-4 bg-slate-900 text-emerald-400 border border-slate-700 rounded-xl outline-none font-mono text-[10px] leading-relaxed shadow-xl" />
                                     </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                      <div className="space-y-3 text-xs">
                                        <div className="flex items-center justify-between">
                                          <h3 className="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-indigo-600"><FileText size={12} /> Functional Specification</h3>
                                          <div className="flex gap-1">
                                            <input value={aiRefinementInput} onChange={(e) => setAiRefinementInput(e.target.value)} placeholder="AI instructions..." className="px-2 py-1 border rounded-lg text-[9px] outline-none focus:border-indigo-400 w-24 shadow-sm" />
                                            <button onClick={refineAiSpec} disabled={isAiRefining} className="p-1 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-sm transition-all">{isAiRefining ? <Loader2 className="animate-spin" size={10} /> : <Sparkles size={10} />}</button>
                                          </div>
                                        </div>
                                        <textarea value={String(editBuffer.specs[activeSpecIndex].details || "")} onChange={(e) => updateEditSpec('details', e.target.value)} className="w-full h-48 p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-100 text-[11px] leading-relaxed shadow-inner resize-none font-sans" />
                                      </div>
                                      <div className="space-y-3">
                                        <div className="flex items-center justify-between">
                                          <h3 className="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-emerald-600"><CheckCircle size={12} /> Acceptance Criteria</h3>
                                          <button onClick={syncWithAi} disabled={isAiRefining} className="text-[8px] font-black bg-slate-100 text-indigo-600 px-2 py-1 rounded-lg border border-indigo-100 flex items-center gap-1 hover:bg-indigo-50 shadow-sm transition-all"><IterationCcw size={10} /> SYNC AI</button>
                                        </div>
                                        <div className="space-y-1.5 max-h-48 overflow-y-auto p-1 scrollbar-hide text-xs text-slate-700">
                                          {(editBuffer.specs[activeSpecIndex].acceptance_criteria || []).map((ac, i) => (
                                            <div key={i} className="flex gap-2 items-center group">
                                              <div className="flex-1 p-2 bg-emerald-50 border border-emerald-100 rounded-lg shadow-sm"><input value={String(ac)} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].acceptance_criteria]; n[i] = e.target.value; updateEditSpec('acceptance_criteria', n); }} className="w-full bg-transparent outline-none text-emerald-900 text-[10px] font-medium" /></div>

                                            </div>
