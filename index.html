<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecScribe | Inventi Architects</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for compiling React JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Mammoth for Word Document parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        /* Custom scrollbar hiding utilities */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // Import React and ReactDOM via CDN
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // Import Icons
        import * as Lucide from 'https://esm.sh/lucide-react@0.292.0';
        
        // Import Firebase via CDN
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, updateDoc, serverTimestamp, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { 
          FileText, Send, Settings, CheckCircle, Database, List, Loader2, ChevronRight, 
          AlertCircle, Copy, Upload, FileUp, X, Plus, Folder, ChevronLeft, Trash2, 
          Clock, LayoutDashboard, Eye, Edit3, LogOut, LogIn, User: UserIcon, 
          Layers, PanelLeft, RotateCcw, History, Info, UserCheck, Save, Sparkles, 
          IterationCcw, ChevronDown, CheckSquare, PlusCircle, Trash, RefreshCw,
          Search, ArrowRightLeft, MessageSquare, Table: TableIcon, Layout,
          MinusCircle, Diff, Type, Check, ToggleLeft, ToggleRight, Asterisk, Ban,
          GitBranch, Maximize2, ZoomIn, ZoomOut, FilePlus, Activity, Key, ShieldAlert
        } = Lucide;

        /**
         * SMART DEPLOYMENT CONFIGURATION
         */
        const isCanvas = typeof __firebase_config !== 'undefined';

        const firebaseConfig = isCanvas 
          ? JSON.parse(__firebase_config) 
          : {
              apiKey: "AIzaSyA4MigXloQytLiskv2HkoyfV8S6tt2RSTo",
              authDomain: "spec-scribe.firebaseapp.com",
              projectId: "spec-scribe",
              storageBucket: "spec-scribe.firebasestorage.app",
              messagingSenderId: "544837745193",
              appId: "1:544837745193:web:59f56a7c411daa370a3a38",
              measurementId: "G-FSRJTL02BF"
            };

        const GEMINI_API_KEY = "AIzaSyD6gYk1fJItGeU9ih3AhTMp1a3IHBlHvZo"; 
        const activeAppId = isCanvas && typeof __app_id !== 'undefined' ? __app_id : 'spec-scribe-app';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const SYSTEM_PROMPT = `You are an Expert Systems Architect. Your goal is to scribe an exhaustive Technical Specification Blueprint. 
CRITICAL: Focus strictly on the PROVIDED MODULE. Identify every requirement and business rule. 
Generate a "flowchart_mermaid" string using 'graph TD'. Labels MUST be in double quotes: NodeID["Label"]. 
Output must be ONLY a valid JSON object.`;

        const Mermaid = ({ chart, id }) => {
          const ref = useRef(null);
          useEffect(() => {
            const renderChart = async () => {
              if (!ref.current || !chart) return;
              try {
                const safeId = `mermaid_diag_${String(id).replace(/[^a-zA-Z0-9]/g, '_')}`;
                if (!window.mermaid) {
                  const script = document.createElement('script');
                  script.src = 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js';
                  script.async = true;
                  script.onload = () => {
                    window.mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose', flowchart: { curve: 'basis', htmlLabels: true } });
                    executeRender(safeId, chart);
                  };
                  document.head.appendChild(script);
                } else { executeRender(safeId, chart); }
              } catch (e) { }
            };
            const executeRender = async (safeId, cleanChart) => {
              try {
                const { svg } = await window.mermaid.render(safeId, cleanChart);
                if (ref.current) ref.current.innerHTML = svg;
              } catch (e) { 
                  if (ref.current) ref.current.innerHTML = '<div class="p-4 text-rose-400 text-[10px] font-bold border border-dashed rounded-xl">Flowchart Syntax Error</div>';
              }
            };
            renderChart();
          }, [chart, id]);
          return <div ref={ref} className="flex justify-center w-full overflow-auto py-4 bg-white rounded-2xl min-h-[200px]" />;
        };

        const App = () => {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [view, setView] = useState('login');
          const [dashboardFilter, setDashboardFilter] = useState('active'); 
          const [workspaceTab, setWorkspaceTab] = useState('editor');
          const [showModuleSidebar, setShowModuleSidebar] = useState(true);
          const [projects, setProjects] = useState([]);
          const [currentProjectId, setCurrentProjectId] = useState(null);
          const [newProjectName, setNewProjectName] = useState("");
          const [isCreatingProject, setIsCreatingProject] = useState(false);
          const [editingProjectId, setEditingProjectId] = useState(null);
          const [tempProjectName, setTempProjectName] = useState("");
          const [modules, setModules] = useState([]);
          const [activeModuleId, setActiveModuleId] = useState(null);
          const [isCreatingModule, setIsCreatingModule] = useState(false);
          const [newModuleName, setNewModuleName] = useState("");
          const [editingModuleId, setEditingModuleId] = useState(null);
          const [tempModuleName, setTempModuleName] = useState("");
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);
          const [activeSpecIndex, setActiveSpecIndex] = useState(0);
          const [isEditingBlueprint, setIsEditingBlueprint] = useState(false);
          const [editBuffer, setEditBuffer] = useState(null);
          const [showHistory, setShowHistory] = useState(false);
          const [revisions, setRevisions] = useState([]);
          const [projectHistory, setProjectHistory] = useState([]);
          const [aiRefinementInput, setAiRefinementInput] = useState("");
          const [isAiRefining, setIsAiRefining] = useState(false);
          const [isFlowExplorerOpen, setIsFlowExplorerOpen] = useState(false);
          const [zoomLevel, setZoomLevel] = useState(1);
          const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
          const [isDraggingExplorer, setIsDraggingExplorer] = useState(false);
          const [dragStartPos, setDragStartPos] = useState({ x: 0, y: 0 });
          
          // API Key and Model configuration
          const [customApiKey, setCustomApiKey] = useState(() => localStorage.getItem('specscribe_gemini_key') || '');
          const [customModel, setCustomModel] = useState(() => localStorage.getItem('specscribe_gemini_model') || 'gemini-2.5-flash');
          const [showApiModal, setShowApiModal] = useState(false);

          const fileInputRef = useRef(null);

          const activeModuleData = (modules || []).find(m => m.id === activeModuleId);
          const currentProjectData = (projects || []).find(p => p.id === currentProjectId);

          const getEffectiveApiKey = () => {
              if (customApiKey) return customApiKey;
              if (isCanvas) return ""; 
              return GEMINI_API_KEY;
          };

          const getEffectiveModel = () => {
              if (isCanvas) return "gemini-2.5-flash-preview-09-2025";
              return customModel || "gemini-2.5-flash";
          };
          
          const getUserIdentity = () => String(user?.displayName || user?.email || user?.uid || 'Anonymous');
          
          const formatDate = (ts) => {
            if (!ts) return '...';
            const date = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
            return date.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
          };
          
          const sanitizeInput = (text) => text?.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'").replace(/[\u2013\u2014]/g, "-").replace(/\u2026/g, "...").replace(/\u00A0/g, " ").replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F-\x9F]/g, "") || "";

          const openFlowExplorer = () => {
              setZoomLevel(1);
              setPanOffset({ x: 0, y: 0 });
              setIsFlowExplorerOpen(true);
          };

          const handleExplorerMouseDown = (e) => {
              setIsDraggingExplorer(true);
              setDragStartPos({ x: e.clientX - panOffset.x, y: e.clientY - panOffset.y });
          };

          const handleExplorerMouseMove = (e) => {
              if (!isDraggingExplorer) return;
              setPanOffset({ x: e.clientX - dragStartPos.x, y: e.clientY - dragStartPos.y });
          };

          const handleExplorerMouseUp = () => setIsDraggingExplorer(false);

          const logProjectActivity = async (type, detail) => {
            if (!user || !currentProjectId) return;
            try {
              const historyRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'history');
              await addDoc(historyRef, { timestamp: serverTimestamp(), userName: getUserIdentity(), type: String(type), detail: String(detail) });
            } catch (e) { }
          };

          const updateModuleData = async (mid, updates, auditType = 'Technical Update') => {
            if (!user || !currentProjectId) return;
            const mRef = doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules', mid);
            const activeModule = (modules || []).find(m => m.id === mid);
            
            if (updates.result || updates.name || updates.inputText) {
              const before = updates.result ? activeModule?.result : (updates.name ? activeModule?.name : activeModule?.inputText);
              const after = updates.result ? updates.result : (updates.name ? updates.name : updates.inputText);
              
              const historyRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules', mid, 'revisions');
              await addDoc(historyRef, {
                timestamp: serverTimestamp(),
                userName: getUserIdentity(),
                type: String(auditType),
                before: typeof before === 'object' ? before : String(before || ""),
                after: typeof after === 'object' ? after : String(after || "")
              });
            }

            await updateDoc(mRef, { ...updates, updatedAt: serverTimestamp(), updatedBy: getUserIdentity() });
            await updateDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId), { updatedAt: serverTimestamp(), updatedBy: getUserIdentity() });
          };

          const loginWithGoogle = async () => {
            setError(null);
            const provider = new GoogleAuthProvider();
            try { 
              const result = await signInWithPopup(auth, provider);
              const email = result.user.email;
              const isAuthorized = email.endsWith('@inventi.ph') || email.endsWith('@inventi.asia');
              if (!isAuthorized) {
                  await signOut(auth);
                  setError("Access Denied: Use @inventi.ph or @inventi.asia email.");
                  return;
              }
              setView('dashboard');
            } catch (err) { setError("Failed to sign in."); }
          };

          const openProject = (id) => {
            setCurrentProjectId(id);
            setActiveModuleId(null);
            setView('workspace');
            setWorkspaceTab('editor');
            setIsEditingBlueprint(false);
            setActiveSpecIndex(0);
          };

          const createProject = async () => {
            if (!newProjectName.trim() || !user) return;
            const id = crypto.randomUUID();
            await setDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', id), { name: newProjectName.trim(), createdAt: new Date().toISOString(), updatedAt: serverTimestamp(), createdBy: getUserIdentity(), updatedBy: getUserIdentity(), isDeleted: false, status: 'active' });
            setNewProjectName(""); setIsCreatingProject(false); openProject(id);
          };

          const createModule = async () => {
            if (!newModuleName.trim() || !user || !currentProjectId) return;
            const id = crypto.randomUUID();
            const name = newModuleName.trim();
            await setDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules', id), { name, createdAt: serverTimestamp(), updatedAt: serverTimestamp(), createdBy: getUserIdentity(), updatedBy: getUserIdentity(), inputText: "", result: null, fileName: "" });
            await logProjectActivity('Module Created', `Added module: ${name}`);
            setNewModuleName(""); setIsCreatingModule(false); setActiveModuleId(id); setWorkspaceTab('editor');
          };
          
          const deleteModule = async (moduleId, e) => {
            if (e) e.stopPropagation();
            if (!user || !currentProjectId) return;
            const m = (modules || []).find(item => item.id === moduleId);
            try {
              await logProjectActivity('Module Deleted', `Deleted module: ${m?.name || moduleId}`);
              await deleteDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules', moduleId));
              if (activeModuleId === moduleId) setActiveModuleId(null);
            } catch (err) { setError("Failed to delete module."); }
          };

          const saveProjectName = async (id) => {
            if (!tempProjectName.trim()) { setEditingProjectId(null); return; }
            await logProjectActivity('Project Renamed', `Changed project name to: ${tempProjectName}`);
            await updateDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', id), { name: tempProjectName.trim(), updatedAt: serverTimestamp(), updatedBy: getUserIdentity() });
            setEditingProjectId(null);
          };

          const saveModuleName = async (moduleId) => {
            if (!tempModuleName.trim()) { setEditingModuleId(null); return; }
            await updateModuleData(moduleId, { name: tempModuleName.trim() }, 'Module Renamed');
            setEditingModuleId(null);
          };

          const softDeleteProject = async (id, e) => {
            if (e) e.stopPropagation();
            if (!user) return;
            try { await updateDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', id), { isDeleted: true, deletedAt: serverTimestamp(), deletedBy: getUserIdentity() }); } catch (err) { setError("Failed to move to bin."); }
          };

          const restoreProject = async (id, e) => {
            if (e) e.stopPropagation();
            if (!user) return;
            try { await updateDoc(doc(db, 'artifacts', activeAppId, 'public', 'data', 'projects', id), { isDeleted: false, deletedAt: null }); } catch (err) { setError("Failed to restore."); }
          };

          const generateSpecs = async () => {
            if (!activeModuleData || !activeModuleData.inputText.trim()) return;
            
            const keyToUse = getEffectiveApiKey();
            const modelToUse = getEffectiveModel();
            
            if (!keyToUse) {
                setShowApiModal(true);
                return;
            }

            setLoading(true); setError(null);

            const callAiWithRetry = async (attempt = 0) => {
              try {
                const promptContext = `MODULE CONTEXT: Analyzing "${activeModuleData.name}". Extract technical requirements strictly for this scope. Text: ${sanitizeInput(activeModuleData.inputText)}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelToUse}:generateContent?key=${keyToUse}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ 
                    contents: [{ parts: [{ text: promptContext }] }], 
                    systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }, 
                    generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
                  })
                });

                if (!response.ok) {
                  const errPayload = await response.json().catch(() => ({}));
                  console.error("AI Generation Rejected:", errPayload);

                  if ((response.status === 429 || response.status >= 500) && attempt < 5) {
                    const delay = Math.pow(2, attempt) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                    return callAiWithRetry(attempt + 1);
                  }
                  if (response.status === 400 || response.status === 403 || response.status === 404) {
                      setShowApiModal(true);
                      throw new Error(`API Key or Model invalid (${response.status}). Details: ${errPayload?.error?.message || 'Check model version or key'}`);
                  }
                  throw new Error(`AI Gateway Error (${response.status}): ${errPayload?.error?.message || 'Unknown network error'}`);
                }

                const data = await response.json();
                const rawContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!rawContent) {
                    throw new Error("AI returned an empty response. It may have been blocked by safety filters.");
                }

                const match = rawContent.match(/\{[\s\S]*\}/);
                if (match) {
                  const parsedResult = JSON.parse(match[0]);
                  await updateModuleData(activeModuleId, { result: parsedResult }, 'Deep AI Scribed');
                  setActiveSpecIndex(0); 
                  setWorkspaceTab('blueprint');
                } else {
                  throw new Error("AI output was not in the expected JSON format. Please refine the text and try again.");
                }
              } catch (err) {
                if (attempt < 5 && !err.message.includes("API Key") && !err.message.includes("Safety") && !err.message.includes("format") && !err.message.includes("invalid")) {
                  const delay = Math.pow(2, attempt) * 1000;
                  await new Promise(r => setTimeout(r, delay));
                  return callAiWithRetry(attempt + 1);
                }
                throw err;
              }
            };

            try {
              await callAiWithRetry();
            } catch (err) {
              setError(err.message || "Deep Scribe failed. Ensure the input text is not excessively large.");
            } finally {
              setLoading(false);
            }
          };

          const startEditingBlueprint = () => {
            if (activeModuleData?.result) {
                setEditBuffer(JSON.parse(JSON.stringify(activeModuleData.result)));
                setIsEditingBlueprint(true);
            }
          };

          const saveBlueprintChanges = async () => {
            if (!editBuffer) return;
            await updateModuleData(activeModuleId, { result: editBuffer }, 'Manual Blueprint Edit');
            setIsEditingBlueprint(false);
            setEditBuffer(null);
          };

          const syncWithAi = async () => {
            if (!editBuffer) return;
            const keyToUse = getEffectiveApiKey();
            const modelToUse = getEffectiveModel();
            
            if (!keyToUse) { setShowApiModal(true); return; }
            setIsAiRefining(true);
            
            const callAiWithRetry = async (attempt = 0) => {
                try {
                  const currentSpec = editBuffer.specs?.[activeSpecIndex];
                  if (!currentSpec) return;
                  const prompt = `DEEP ANALYSIS: Refine JSON logic for the module. Context: ${currentSpec.details}`;
                  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelToUse}:generateContent?key=${keyToUse}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" }})
                  });
                  
                  if (!res.ok) {
                      const errPayload = await res.json().catch(() => ({}));
                      console.error("AI Sync Error:", errPayload);
                      
                      if ((res.status === 429 || res.status >= 500) && attempt < 5) {
                          const delay = Math.pow(2, attempt) * 1000;
                          await new Promise(r => setTimeout(r, delay));
                          return callAiWithRetry(attempt + 1);
                      }
                      if (res.status === 400 || res.status === 403 || res.status === 404) {
                          setShowApiModal(true);
                          throw new Error("Invalid API Key or Model access denied.");
                      }
                      throw new Error("API Request Failed");
                  }
                  
                  const data = await res.json();
                  const match = data.candidates?.[0]?.content?.parts?.[0]?.text?.match(/\{[\s\S]*\}/);
                  if (match) {
                    const synced = JSON.parse(match[0]);
                    const newBuffer = {...editBuffer};
                    newBuffer.specs[activeSpecIndex].data_fields = synced.data_fields || [];
                    newBuffer.specs[activeSpecIndex].acceptance_criteria = synced.acceptance_criteria || [];
                    newBuffer.specs[activeSpecIndex].flowchart_mermaid = synced.flowchart_mermaid || currentSpec.flowchart_mermaid;
                    setEditBuffer(newBuffer);
                  }
                } catch (err) {
                    if (attempt < 5 && !err.message.includes("API")) {
                        const delay = Math.pow(2, attempt) * 1000;
                        await new Promise(r => setTimeout(r, delay));
                        return callAiWithRetry(attempt + 1);
                    }
                    console.error(err);
                }
            };
            
            try { await callAiWithRetry(); } finally { setIsAiRefining(false); }
          };

          const refineAiSpec = async () => {
            if (!aiRefinementInput.trim() || !editBuffer) return;
            const keyToUse = getEffectiveApiKey();
            const modelToUse = getEffectiveModel();
            
            if (!keyToUse) { setShowApiModal(true); return; }
            setIsAiRefining(true);
            
            const callAiWithRetry = async (attempt = 0) => {
                try {
                  const currentSpec = editBuffer.specs?.[activeSpecIndex];
                  if (!currentSpec) return;
                  const prompt = `Refine this functional specification: "${aiRefinementInput}". Return ONLY the refined text. Original: ${currentSpec.details}`;
                  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelToUse}:generateContent?key=${keyToUse}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                  });
                  
                  if (!res.ok) {
                      const errPayload = await res.json().catch(() => ({}));
                      console.error("AI Refinement Error:", errPayload);
                      
                      if ((res.status === 429 || res.status >= 500) && attempt < 5) {
                          const delay = Math.pow(2, attempt) * 1000;
                          await new Promise(r => setTimeout(r, delay));
                          return callAiWithRetry(attempt + 1);
                      }
                      if (res.status === 400 || res.status === 403 || res.status === 404) {
                          setShowApiModal(true);
                          throw new Error("Invalid API Key or Model access denied.");
                      }
                      throw new Error("API Request Failed");
                  }
                  
                  const data = await res.json();
                  const refined = data.candidates?.[0]?.content?.parts?.[0]?.text;
                  if (refined) {
                    const newBuffer = {...editBuffer};
                    newBuffer.specs[activeSpecIndex].details = String(refined);
                    setEditBuffer(newBuffer);
                    setAiRefinementInput("");
                  }
                } catch (err) {
                    if (attempt < 5 && !err.message.includes("API")) {
                        const delay = Math.pow(2, attempt) * 1000;
                        await new Promise(r => setTimeout(r, delay));
                        return callAiWithRetry(attempt + 1);
                    }
                    console.error(err);
                }
            };
            
            try { await callAiWithRetry(); } finally { setIsAiRefining(false); }
          };

          const updateEditSpec = (field, val) => {
            const newBuffer = {...editBuffer};
            if (newBuffer.specs?.[activeSpecIndex]) {
                newBuffer.specs[activeSpecIndex][field] = val;
                setEditBuffer(newBuffer);
            }
          };

          const handleFileUpload = async (event) => {
            const file = event.target.files?.[0];
            if (!file || !activeModuleId) return;
            setLoading(true);
            try {
              let content = "";
              if (file.name.endsWith('.docx')) {
                const arrayBuffer = await file.arrayBuffer();
                const result = await window.mammoth.extractRawText({ arrayBuffer });
                content = result.value;
              } else { content = await file.text(); }
              await updateModuleData(activeModuleId, { inputText: content, fileName: file.name });
            } catch (e) { setError("Import failed."); } finally { setLoading(false); }
          };

          const detectChanges = (before, after) => {
            const changes = [];
            if (!before || !after) return [];
            
            if (typeof before === 'string' && typeof after === 'string' && before !== after) {
                changes.push({ section: "Source Document", type: "modified", field: "Text Content", from: before, to: after });
                return changes;
            }

            if (before.project_summary !== after.project_summary) {
                changes.push({ section: "Project", type: "modified", field: "Summary", from: before.project_summary, to: after.project_summary });
            }

            if (after.specs) {
                const bSpecs = before.specs || [];
                const aSpecs = after.specs || [];

                aSpecs.forEach((aS, idx) => {
                    const bS = bSpecs.find(b => b.id === aS.id) || bSpecs[idx];
                    const specName = aS.feature_name || 'Feature Spec';
                    
                    if (!bS) { 
                        changes.push({ section: String(specName), type: 'added', field: "Specification", from: "None", to: "Created new feature" }); 
                        return; 
                    }

                    if (bS.feature_name !== aS.feature_name) changes.push({ section: String(specName), type: "modified", field: "Feature Name", from: bS.feature_name, to: aS.feature_name });
                    if (bS.details !== aS.details) changes.push({ section: String(specName), type: "modified", field: "Functional Details", from: bS.details, to: aS.details });
                    if (bS.flowchart_mermaid !== aS.flowchart_mermaid) changes.push({ section: String(specName), type: "modified", field: "Process Flowchart", from: bS.flowchart_mermaid, to: aS.flowchart_mermaid });
                    
                    if (JSON.stringify(bS.acceptance_criteria) !== JSON.stringify(aS.acceptance_criteria)) {
                        changes.push({ section: String(specName), type: "modified", field: "Acceptance Criteria", from: JSON.stringify(bS.acceptance_criteria || []), to: JSON.stringify(aS.acceptance_criteria || []) });
                    }

                    const bFields = bS.data_fields || [];
                    const aFields = aS.data_fields || [];
                    
                    aFields.forEach((aF, fIdx) => {
                        const bF = bFields.find(f => f.name === aF.name) || bFields[fIdx];
                        if (!bF) {
                            changes.push({ section: String(specName), type: "added", field: `Data Field: ${aF.name}`, from: "None", to: JSON.stringify(aF) });
                            return;
                        }
                        
                        ['name', 'type', 'notes', 'condition', 'source', 'isRequired', 'isEnabled'].forEach(prop => {
                            if (bF[prop] !== aF[prop]) {
                                changes.push({ section: String(specName), type: "modified", field: `Field [${aF.name}] - ${prop}`, from: String(bF[prop]), to: String(aF[prop]) });
                            }
                        });

                        if (JSON.stringify(bF.options) !== JSON.stringify(aF.options)) {
                            changes.push({ section: String(specName), type: "modified", field: `Field [${aF.name}] - options`, from: String(bF.options || []), to: String(aF.options || []) });
                        }
                    });
                    
                    bFields.forEach(bF => {
                        if (!aFields.find(f => f.name === bF.name)) {
                            changes.push({ section: String(specName), type: "removed", field: `Data Field: ${bF.name}`, from: JSON.stringify(bF), to: "Deleted" });
                        }
                    });
                });

                bSpecs.forEach(bS => {
                    if (!aSpecs.find(a => a.id === bS.id)) {
                        changes.push({ section: String(bS.feature_name || 'Spec'), type: 'removed', field: "Specification", from: "Existing feature", to: "Deleted" });
                    }
                });
            }
            return changes;
          };

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (isCanvas) {
                  if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                  } else { await signInAnonymously(auth); }

              } catch (err) { } finally { setAuthLoading(false); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              if (currentUser) {
                  const email = currentUser.email;
                  const isAuthorized = isCanvas || (email && (email.endsWith('@inventi.ph') || email.endsWith('@inventi.asia')));
                  if (isAuthorized) { setUser(currentUser); setView(prev => prev === 'login' ? 'dashboard' : prev); } 
                  else { signOut(auth); setView('login'); setError("Unauthorized domain."); }
              } else { setView('login'); }
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const projectsRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects');
            return onSnapshot(projectsRef, (snapshot) => {
              setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0)));
            });
          }, [user]);

          useEffect(() => {
            if (!user || !currentProjectId) return;
            const modulesRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules');
            return onSnapshot(modulesRef, (snapshot) => {
              setModules(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0)));
            });
          }, [user, currentProjectId]);

          // Additional sync for History

            if (!user || !currentProjectId) return;

                setProjectHistory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
            });
          }, [user, currentProjectId]);

          useEffect(() => {
            if (!user || !currentProjectId || !activeModuleId) { setRevisions([]); return; }
            const historyRef = collection(db, 'artifacts', activeAppId, 'public', 'data', 'projects', currentProjectId, 'modules', activeModuleId, 'revisions');
            return onSnapshot(historyRef, (snapshot) => {
              setRevisions(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
            });

                    <div className="bg-white max-w-md w-full rounded-[2.5rem] shadow-xl p-12 text-center animate-in zoom-in-95 duration-500 border border-slate-100">

                            <Settings size={40} className="transform rotate-3" />
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 tracking-tighter mb-3">SpecScribe</h1>
                        <p className="text-slate-500 text-sm mb-10 leading-relaxed">Authorized workspace for Inventi Architects.</p>
                        <button onClick={loginWithGoogle} className="w-full bg-white border-2 border-slate-200 hover:border-indigo-600 hover:bg-indigo-50 text-slate-700 font-bold py-3.5 px-4 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-sm">
                            <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            Login with Google
                        </button>
                        {error && <div className="mt-6 p-4 bg-red-50 border border-red-100 rounded-2xl text-red-600 text-xs font-bold flex flex-col items-center gap-2"><ShieldAlert size={24}/><p>{String(error)}</p></div>}
                    </div>

                                        <h3 className="text-lg font-bold text-slate-800 mb-1 truncate">{String(p.name)}</h3>
                                        <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4">Updated {formatDate(p.updatedAt)}</p>
                                      </div>

                                    <div className="pt-4 border-t border-slate-50 flex items-center justify-between mt-4">

                                        {!p.isDeleted && !editingProjectId && <ChevronRight size={16} className="text-slate-300 group-hover:translate-x-1 transition-transform" />}
                                    </div>
                                </div>

                            {projects.filter(p => dashboardFilter === 'trash' ? p.isDeleted : !p.isDeleted).length === 0 && (

                                          ) : (

                                          <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-all shrink-0">

                                          <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{workspaceTab === 'editor' ? 'Technical Input' : 'System Blueprint'}</p>
                                      </div>
                                      <div className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                                          <button onClick={() => setWorkspaceTab('editor')} className={`px-6 py-2 rounded-xl font-bold text-[10px] transition-all ${workspaceTab === 'editor' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400 hover:text-slate-600'}`}>EDITOR</button>

                                  </div>

                                  {workspaceTab === 'editor' ? (
                                      <div className="flex-1 flex flex-col bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden animate-in slide-in-from-bottom-4">

                                          </div>
                                          <div className="flex-1 flex flex-col p-6">
                                              {activeModuleData?.fileName && <div className="mb-4 bg-indigo-50 p-3 rounded-2xl flex justify-between items-center text-[10px] font-bold text-indigo-700 border border-indigo-100"><span className="flex items-center gap-2"><Upload size={14}/> Source: {activeModuleData.fileName}</span><button onClick={() => updateModuleData(activeModuleId, {fileName: "", inputText: ""})} className="text-indigo-300 hover:text-indigo-600"><X size={14}/></button></div>}
                                              <textarea

                                                className="flex-1 w-full p-6 text-sm leading-relaxed outline-none resize-none text-slate-700 placeholder:text-slate-300 font-sans"

                                                  {!isEditingBlueprint ? (
                                                    <button onClick={startEditingBlueprint} className="bg-white/10 hover:bg-white text-white hover:text-indigo-600 px-6 py-2 rounded-xl text-[10px] font-bold transition-all flex items-center gap-2 border border-white/20 shadow-lg"><Edit3 size={14} /> Update Specs</button>

                                                    <div className="flex gap-2">
                                                      <button onClick={saveBlueprintChanges} className="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-xl text-[10px] font-bold transition-all shadow-lg flex items-center gap-1.5 shadow-emerald-200"><Save size={14} /> Save Changes</button>

                                              </div>

                                                          <th className="px-4 py-2 tracking-wider text-center">#</th>
                                                          <th className="px-4 py-2 tracking-wider text-left">Major Spec</th>
                                                          <th className="px-4 py-2 tracking-wider text-center">Fields</th>
                                                          <th className="px-4 py-2 tracking-wider text-center">AC</th>
                                                        </tr>
                                                      </thead>
                                                      <tbody className="divide-y divide-slate-100">
                                                        {((isEditingBlueprint ? editBuffer : activeModuleData.result)?.specs || []).map((s, idx) => (

                                                            <td className={`px-4 py-2.5 text-[10px] font-mono text-center ${activeSpecIndex === idx ? 'text-indigo-600' : 'text-slate-400'}`}>{idx + 1}</td>
                                                            <td className={`px-4 py-2.5 text-[11px] ${activeSpecIndex === idx ? 'text-indigo-700' : ''}`}>{String(s.feature_name || 'Module')}</td>
                                                            <td className="px-4 py-2.5 text-center"><span className="text-[8px] font-black bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded border border-slate-300 shadow-sm">{s.data_fields?.length || 0}</span></td>
                                                            <td className="px-4 py-2.5 text-center"><span className="text-[8px] font-black bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded border border-slate-300 shadow-sm">{s.acceptance_criteria?.length || 0}</span></td>
                                                          </tr>
                                                        ))}
                                                      </tbody>
                                                    </table>
                                                  </div>
                                                </div>

                                                <div className="mb-10 animate-in slide-in-from-bottom-2">
                                                   <div className="flex items-center justify-between mb-4">
                                                      <h3 className="text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-3 text-slate-400 border-l-4 border-amber-500 pl-4">Process Architecture</h3>
                                                      <button onClick={openFlowExplorer} className="flex items-center gap-1.5 px-3 py-1 bg-white border border-slate-200 rounded-lg text-[9px] font-black uppercase text-indigo-600 hover:bg-slate-50 transition-all shadow-sm"><Maximize2 size={12} /> Explore Flowchart</button>
                                                   </div>
                                                   <div className="p-4 bg-white border border-slate-200 rounded-3xl shadow-inner min-h-[300px] flex items-center justify-center">
                                                      { (isEditingBlueprint ? editBuffer : activeModuleData.result)?.specs?.[activeSpecIndex] ? (
                                                        <Mermaid id={`main-flow-${activeSpecIndex}`} chart={(isEditingBlueprint ? editBuffer : activeModuleData.result).specs[activeSpecIndex].flowchart_mermaid || 'graph TD\\n  Start["No logic mapped"]'} />
                                                      ) : (
                                                        <div className="text-slate-300 italic text-[10px]">No logic mapped yet.</div>
                                                      )}
                                                   </div>
                                                </div>

                                                {isEditingBlueprint && editBuffer?.specs?.[activeSpecIndex] ? (
                                                  <div className="space-y-8 animate-in zoom-in-95 duration-300 text-slate-700">
                                                     <div className="space-y-3">
                                                        <h3 className="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-amber-600"><GitBranch size={12} /> Flowchart Logic (Mermaid)</h3>
                                                        <textarea value={editBuffer.specs[activeSpecIndex].flowchart_mermaid || ""} onChange={(e) => updateEditSpec('flowchart_mermaid', e.target.value)} className="w-full h-32 p-4 bg-slate-900 text-emerald-400 border border-slate-700 rounded-xl outline-none font-mono text-[10px] leading-relaxed shadow-xl" />
                                                     </div>

                                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                                      <div className="space-y-3 text-xs">
                                                        <div className="flex items-center justify-between">
                                                          <h3 className="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-indigo-600"><FileText size={12} /> Functional Specification</h3>
                                                          <div className="flex gap-1">
                                                            <input value={aiRefinementInput} onChange={(e) => setAiRefinementInput(e.target.value)} placeholder="AI instructions..." className="px-2 py-1 border rounded-lg text-[9px] outline-none focus:border-indigo-400 w-24 shadow-sm" />
                                                            <button onClick={refineAiSpec} disabled={isAiRefining} className="p-1 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-sm transition-all">{isAiRefining ? <Loader2 className="animate-spin" size={10} /> : <Sparkles size={10} />}</button>
                                                          </div>
                                                        </div>
                                                        <textarea value={String(editBuffer.specs[activeSpecIndex].details || "")} onChange={(e) => updateEditSpec('details', e.target.value)} className="w-full h-48 p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-100 text-[11px] leading-relaxed shadow-inner resize-none font-sans" />
                                                      </div>
                                                      <div className="space-y-3">
                                                        <div className="flex items-center justify-between">
                                                          <h3 className="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-emerald-600"><CheckCircle size={12} /> Acceptance Criteria</h3>
                                                          <button onClick={syncWithAi} disabled={isAiRefining} className="text-[8px] font-black bg-slate-100 text-indigo-600 px-2 py-1 rounded-lg border border-indigo-100 flex items-center gap-1 hover:bg-indigo-50 shadow-sm transition-all"><IterationCcw size={10} /> SYNC AI</button>
                                                        </div>
                                                        <div className="space-y-1.5 max-h-48 overflow-y-auto p-1 scrollbar-hide text-xs text-slate-700">
                                                          {(editBuffer.specs[activeSpecIndex].acceptance_criteria || []).map((ac, i) => (
                                                            <div key={i} className="flex gap-2 items-center group text-slate-700">
                                                              <div className="flex-1 p-2 bg-emerald-50 border border-emerald-100 rounded-lg shadow-sm"><input value={String(ac)} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].acceptance_criteria]; n[i] = e.target.value; updateEditSpec('acceptance_criteria', n); }} className="w-full bg-transparent outline-none text-emerald-900 text-[10px] font-medium" /></div>
                                                              <button onClick={() => { const n = editBuffer.specs[activeSpecIndex].acceptance_criteria.filter((_, idx) => idx !== i); updateEditSpec('acceptance_criteria', n); }} className="p-1 text-red-300 hover:text-red-500 transition-colors"><Trash size={12} /></button>
                                                            </div>
                                                          ))}
                                                          <button onClick={() => { const n = [...(editBuffer.specs[activeSpecIndex].acceptance_criteria || []), "New requirement..."]; updateEditSpec('acceptance_criteria', n); }} className="w-full p-2 border-2 border-dashed border-emerald-200 rounded-lg text-emerald-500 font-bold text-[9px] flex items-center justify-center gap-1.5 hover:bg-emerald-50 transition-all">+ Add Criteria</button>
                                                        </div>
                                                      </div>
                                                    </div>

                                                    <div className="space-y-3">
                                                      <h3 className="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-blue-600"><Database size={12} /> Data Model Logic</h3>
                                                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                                        {(editBuffer.specs[activeSpecIndex].data_fields || []).map((f, i) => (
                                                          <div key={i} className={`bg-white border border-slate-200 rounded-2xl p-4 space-y-2 shadow-sm relative group hover:border-indigo-100 transition-all ${f.isEnabled === false ? 'opacity-60 bg-slate-50' : ''}`}>
                                                            <div className="flex justify-between items-start gap-1">
                                                              <div className="flex-1 text-xs">
                                                                <div className="flex items-center gap-1 mb-1">
                                                                  <input value={String(f.name)} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].name = e.target.value; updateEditSpec('data_fields', n); }} className="font-bold text-slate-800 outline-none text-[10px] w-full bg-slate-50 px-1.5 py-0.5 rounded shadow-inner" placeholder="Field" />
                                                                  {f.isRequired && <Asterisk size={8} className="text-red-500 shrink-0" />}
                                                                </div>
                                                                <select value={String(f.type)} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].type = e.target.value; updateEditSpec('data_fields', n); }} className="text-[8px] font-black uppercase text-indigo-600 bg-indigo-50 border-none rounded px-1 outline-none">
                                                                  {['string','number','boolean','date','dropdown','checkbox','radio'].map(t => <option key={t} value={t}>{t}</option>)}
                                                                </select>
                                                              </div>
                                                              <div className="flex flex-col gap-1 shrink-0 text-xs">
                                                                <button onClick={() => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].isRequired = !f.isRequired; updateEditSpec('data_fields', n); }} className={`p-1 rounded ${f.isRequired ? 'bg-red-50 text-red-500' : 'bg-slate-100 text-slate-400'}`}><Asterisk size={10} /></button>
                                                                <button onClick={() => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].isEnabled = !f.isEnabled; updateEditSpec('data_fields', n); }} className={`p-1 rounded ${f.isEnabled !== false ? 'bg-indigo-50 text-indigo-500' : 'bg-slate-200 text-slate-500'}`}>{f.isEnabled !== false ? <ToggleRight size={10} /> : <ToggleLeft size={10} />}</button>
                                                              </div>
                                                            </div>
                                                            <textarea value={String(f.notes || "")} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].notes = e.target.value; updateEditSpec('data_fields', n); }} className="w-full text-[9px] text-slate-500 bg-slate-50 p-1.5 rounded border-none outline-none resize-none font-sans shadow-inner" placeholder="Notes..." rows={1} />
                                                            <div className="pt-2 border-t border-slate-50 space-y-1">
                                                              {['dropdown','radio','checkbox'].includes(f.type) && (
                                                                <input value={Array.isArray(f.options) ? f.options.join(', ') : String(f.options || "")} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].options = e.target.value.split(',').map(s => s.trim()); updateEditSpec('data_fields', n); }} className="w-full text-[8px] bg-white border border-slate-100 rounded px-1.5 py-0.5 outline-none shadow-sm text-slate-700" placeholder="Options (CSV)..." />
                                                              )}
                                                              <input value={String(f.condition || "")} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].condition = e.target.value; updateEditSpec('data_fields', n); }} className="w-full text-[8px] bg-white border border-slate-100 rounded px-1.5 py-0.5 outline-none font-mono shadow-sm text-slate-700" placeholder="Logic..." />
                                                              <input value={String(f.source || "")} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].source = e.target.value; updateEditSpec('data_fields', n); }} className="w-full text-[8px] bg-white border border-slate-100 rounded px-1.5 py-0.5 outline-none font-mono shadow-sm text-slate-700" placeholder="Source..." />
                                                            </div>
                                                            <button onClick={() => { const n = editBuffer.specs[activeSpecIndex].data_fields.filter((_, idx) => idx !== i); updateEditSpec('data_fields', n); }} className="opacity-0 group-hover:opacity-100 absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-1 transition-all shadow-md"><X size={10} /></button>
                                                          </div>
                                                        ))}
                                                        <button onClick={() => { const n = [...(editBuffer.specs[activeSpecIndex].data_fields || []), { name: "field", type: "string", notes: "", options: [], condition: "", source: "", isRequired: false, isEnabled: true }]; updateEditSpec('data_fields', n); }} className="border-2 border-dashed border-slate-200 rounded-xl p-6 flex flex-col items-center justify-center text-slate-300 hover:border-indigo-200 hover:text-indigo-300 transition-all gap-1 shadow-sm"><PlusCircle size={20} /><span className="font-black uppercase tracking-widest text-[8px]">Add Field</span></button>
                                                      </div>
                                                    </div>
                                                  </div>
                                                ) : (
                                                  <div className="space-y-10">
                                                    <div className="space-y-3">
                                                        <h3 className="text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-3 text-slate-400 border-l-4 border-indigo-600 pl-4">Functional Specification</h3>
                                                        <div className="text-[11px] text-slate-700 leading-relaxed bg-slate-50/50 p-6 rounded-2xl border border-slate-100 shadow-inner whitespace-pre-wrap font-sans">{String(activeModuleData.result.specs?.[activeSpecIndex]?.details || "")}</div>
                                                    </div>
                                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 text-slate-700">
                                                        <div className="space-y-6">
                                                            <h3 className="text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-3 text-slate-400 border-l-4 border-blue-500 pl-4">Data Model</h3>
                                                            <div className="space-y-3">
                                                            {(activeModuleData.result.specs?.[activeSpecIndex]?.data_fields || []).map((f, i) => (
                                                                <div key={i} className={`group bg-white border border-slate-100 p-4 rounded-xl shadow-sm hover:shadow-md transition-all relative overflow-hidden ${f.isEnabled === false ? 'opacity-50 grayscale bg-slate-50' : ''}`}>
                                                                <div className="flex justify-between items-start mb-1.5 text-xs text-slate-700">
                                                                    <div className="flex items-center gap-2">
                                                                    <p className="text-[11px] font-bold">{String(f.name)}</p>
                                                                    {f.isRequired && <span className="bg-red-50 text-red-500 text-[7px] font-black px-1 rounded uppercase tracking-tighter border border-red-100 shadow-sm">Mandatory</span>}
                                                                    </div>
                                                                    <span className="px-2 py-0.5 bg-indigo-50 text-indigo-600 text-[8px] font-black uppercase rounded-lg border border-indigo-100 shadow-sm">{String(f.type)}</span>
                                                                </div>
                                                                <p className="text-[10px] text-slate-500 leading-relaxed opacity-80">{String(f.notes)}</p>
                                                                {( (Array.isArray(f.options) && f.options.length > 0) || f.condition || f.source) && (
                                                                    <div className="flex flex-wrap gap-1.5 mt-2.5 pt-2 border-t border-slate-50 text-xs text-slate-600">
                                                                    {Array.isArray(f.options) && f.options.length > 0 && <span className="bg-slate-100 px-1.5 py-0.5 rounded text-[8px] font-bold text-slate-500 uppercase flex items-center gap-1"><List size={8}/> {f.options.join(', ')}</span>}
                                                                    {f.condition && <span className="bg-amber-50 px-1.5 py-0.5 rounded text-[8px] font-bold text-amber-700 uppercase border border-amber-100 flex items-center gap-1 shadow-sm"><Sparkles size={8}/> {String(f.condition)}</span>}
                                                                    {f.source && <span className="bg-indigo-50 px-1.5 py-0.5 rounded text-[8px] font-bold text-indigo-700 uppercase border border-indigo-100 flex items-center gap-1 shadow-sm"><ArrowRightLeft size={8}/> {String(f.source)}</span>}
                                                                    </div>
                                                                )}
                                                                </div>
                                                            ))}
                                                            </div>
                                                        </div>
                                                        <div className="space-y-6">
                                                            <h3 className="text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-3 text-slate-400 border-l-4 border-emerald-500 pl-4">Acceptance Criteria</h3>
                                                            <div className="space-y-3 text-xs">
                                                            {(activeModuleData.result.specs?.[activeSpecIndex]?.acceptance_criteria || []).map((ac, i) => (
                                                                <div key={i} className="flex gap-3 p-4 bg-emerald-50/50 border border-emerald-100 rounded-xl hover:bg-emerald-50 transition-all shadow-sm">
                                                                <div className="mt-0.5 bg-emerald-500 text-white rounded-full p-0.5 shrink-0 shadow-md"><ChevronRight size={10} /></div>
                                                                <p className="text-[11px] font-medium text-emerald-900 leading-normal">{String(ac)}</p>
                                                                </div>
                                                            ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                  </div>
                                                )}
                                              </div>
                                            </div>
                                          </div>
                                      )
                                  )}
                              </div>
                          )}
                      </main>
                  </div>
                )}

                {/* REVISION HISTORY OVERLAY */}
                {showHistory && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300">
                    <div className="bg-white w-full max-w-5xl h-[85vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden animate-in zoom-in-95 duration-500 text-slate-800">
                      <div className="p-6 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-3">
                          <History className="text-indigo-600" size={20} />
                          <h3 className="text-xl font-black tracking-tight text-slate-800">Unified Revision Audit Log</h3>
                        </div>
                        <button onClick={() => setShowHistory(false)} className="p-2 hover:bg-slate-200 rounded-xl transition-colors"><X size={24} /></button>
                      </div>
                      <div className="flex-1 flex overflow-hidden">
                          <div className="w-1/3 border-r border-slate-100 overflow-y-auto p-4 bg-slate-50/30">
                              <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 px-2">Project Activity</h4>
                              <div className="space-y-2">
                                  {(projectHistory || []).map((ph, i) => (
                                      <div key={i} className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm text-xs text-slate-700">
                                          <div className="flex items-center justify-between mb-1 text-[8px]">
                                              <span className="font-black uppercase text-indigo-600 px-1.5 py-0.5 bg-indigo-50 rounded shadow-inner">{String(ph.type)}</span>
                                              <span className="text-slate-400 font-mono">{formatDate(ph.timestamp)}</span>
                                          </div>
                                          <p className="text-[10px] text-slate-700 font-medium leading-tight">{String(ph.detail)}</p>
                                          <p className="text-[8px] text-slate-400 mt-2">By {String(ph.userName)}</p>
                                      </div>
                                  ))}
                                  {projectHistory.length === 0 && <p className="text-center text-slate-400 py-10 text-[10px] italic font-bold">No activity yet.</p>}
                              </div>
                          </div>
                          <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-white text-xs text-slate-700">
                              <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 px-2">Module Blueprints & Specs</h4>
                              {(revisions || []).map((rev, i) => {
                                  const diffs = detectChanges(rev.before, rev.after);
                                  return (
                                  <div key={i} className="bg-slate-50 border border-slate-200 rounded-2xl p-6 space-y-4 relative group animate-in slide-in-from-bottom-2 text-slate-700">
                                      <div className="absolute top-4 right-4"><span className="px-2 py-0.5 bg-white text-indigo-600 rounded-lg text-[8px] font-black uppercase shadow-sm border font-mono">{String(rev.type || "Update")}</span></div>
                                      <div className="flex items-center gap-3">
                                      <UserCheck className="text-indigo-500" size={18} />
                                      <div><p className="text-xs font-black text-slate-800">{String(rev.userName || "Unknown")}</p><p className="text-[9px] text-slate-400 font-mono">{formatDate(rev.timestamp)}</p></div>
                                      </div>
                                      <div className="space-y-2 mt-4 text-[10px] text-slate-700">
                                      {diffs.map((d, di) => (
                                          <div key={di} className="bg-white border border-slate-100 rounded-xl p-4 shadow-sm text-[10px]">
                                              <div className="flex items-center gap-2 mb-2 font-black uppercase text-slate-500 text-[8px]">
                                                  <span>{String(d.section)}</span>
                                                  <span className={`${d.type === 'added' ? 'text-emerald-600' : d.type === 'removed' ? 'text-rose-600' : 'text-blue-600'}`}>
                                                      {d.type === 'added' ? '+ Addition' : d.type === 'removed' ? '- Removal' : '~ Update'}
                                                  </span>
                                              </div>
                                              {d.field && <div className="font-bold text-slate-800 mb-2">{String(d.field)}</div>}
                                              <div className="grid grid-cols-2 gap-4">
                                                  <div className="bg-red-50/30 p-2 rounded-lg border border-red-50 text-red-900/60 line-through whitespace-pre-wrap break-all max-h-32 overflow-y-auto font-mono text-[9px]">{typeof d.from === 'object' ? JSON.stringify(d.from) : String(d.from || "Empty")}</div>
                                                  <div className="bg-emerald-50/30 p-2 rounded-lg border border-emerald-50 text-emerald-900 font-medium whitespace-pre-wrap break-all max-h-32 overflow-y-auto font-mono text-[9px]">{typeof d.to === 'object' ? JSON.stringify(d.to) : String(d.to || "Updated")}</div>
                                              </div>
                                          </div>
                                      ))}
                                      {diffs.length === 0 && <div className="text-slate-400 italic text-[10px]">Structural or metadata update detected.</div>}
                                      </div>
                                  </div>
                                  );
                              })}
                              {revisions.length === 0 && <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-50 py-20 text-xs text-center"><History size={48} className="mx-auto mb-4" /><p className="text-lg font-bold">No revisions yet.</p></div>}
                          </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* FLOW EXPLORER */}
                {isFlowExplorerOpen && activeModuleData?.result && (
                  <div className="fixed inset-0 z-[60] flex flex-col bg-slate-900/95 backdrop-blur-md animate-in fade-in duration-300 text-white">
                     <nav className="p-4 border-b border-white/10 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-4 text-white">
                           <div className="p-2 bg-amber-500 rounded-lg text-white shadow-lg"><GitBranch size={20} /></div>
                           <div><h3 className="font-bold text-sm">{String(activeModuleData.result.specs?.[activeSpecIndex]?.feature_name || 'Logic Map')}</h3><p className="text-white/40 text-[10px] uppercase font-black tracking-widest">Process Architecture Explorer</p></div>
                        </div>
                        <div className="flex items-center gap-4">
                           <div className="flex bg-white/10 p-1 rounded-xl">
                              <button onClick={() => setZoomLevel(prev => Math.max(0.5, prev - 0.1))} className="p-2 hover:bg-white/10 text-white rounded-lg transition-all"><ZoomOut size={18}/></button>
                              <button onClick={() => { setZoomLevel(1); setPanOffset({x:0, y:0}); }} className="px-3 text-white text-[10px] font-bold border-x border-white/10 hover:bg-white/5 transition-colors">{Math.round(zoomLevel * 100)}%</button>
                              <button onClick={() => setZoomLevel(prev => Math.min(2, prev + 0.1))} className="p-2 hover:bg-white/10 text-white rounded-lg transition-all"><ZoomIn size={18}/></button>
                           </div>
                           <button onClick={() => setIsFlowExplorerOpen(false)} className="p-2 bg-white/10 hover:bg-white/20 text-white rounded-xl shadow-xl transition-all"><X size={24} /></button>
                        </div>
                     </nav>
                     <div 
                        className={`flex-1 overflow-hidden p-12 flex items-center justify-center bg-slate-900 select-none ${isDraggingExplorer ? 'cursor-grabbing' : 'cursor-grab'}`}
                        onMouseDown={handleExplorerMouseDown}
                        onMouseMove={handleExplorerMouseMove}
                        onMouseUp={handleExplorerMouseUp}
                        onMouseLeave={handleExplorerMouseUp}
                        onTouchStart={(e) => {
                            setIsDraggingExplorer(true);
                            setDragStartPos({ x: e.touches[0].clientX - panOffset.x, y: e.touches[0].clientY - panOffset.y });
                        }}
                        onTouchMove={(e) => {
                            if (!isDraggingExplorer) return;
                            setPanOffset({ x: e.touches[0].clientX - dragStartPos.x, y: e.touches[0].clientY - dragStartPos.y });
                        }}
                        onTouchEnd={handleExplorerMouseUp}
                     >
                        <div 
                           style={{ 
                              transform: `translate(${panOffset.x}px, ${panOffset.y}px) scale(${zoomLevel})`, 
                              transformOrigin: 'center center',
                              transition: isDraggingExplorer ? 'none' : 'transform 0.1s ease-out'
                           }} 
                           className="bg-white p-20 rounded-[3rem] shadow-2xl pointer-events-none"
                        >
                           {activeModuleData.result.specs?.[activeSpecIndex] ? (
                              <Mermaid id={`explorer-flow-${activeSpecIndex}`} chart={activeModuleData.result.specs[activeSpecIndex].flowchart_mermaid || 'graph TD\\n  Start["No logic mapped"]'} />
                           ) : (
                              <div className="text-slate-300 italic">Map Unavailable</div>
                           )}
                        </div>
                     </div>
                  </div>
                )}

                {/* API KEY MODAL */}
                {showApiModal && (
                  <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                      <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-full animate-in zoom-in-95">
                          <div className="flex items-center gap-3 mb-4 text-indigo-600">
                              <Key size={24} />
                              <h3 className="text-xl font-black text-slate-800">API Gateway Settings</h3>
                          </div>
                          <p className="text-xs text-slate-500 font-medium mb-6 leading-relaxed">
                              Enter your Google Gemini credentials. Data is stored securely in your browser's local storage and never leaves this session.
                          </p>
                          
                          <div className="mb-4">
                              <label className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 block ml-1">Gemini API Key</label>
                              <input 
                                  type="password" 
                                  value={customApiKey} 
                                  onChange={e => setCustomApiKey(e.target.value)} 
                                  className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-100 text-sm font-bold text-slate-800 shadow-inner" 
                                  placeholder="AIzaSy..." 
                              />
                          </div>

                          <div className="mb-8">
                              <label className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 block ml-1">Model Version</label>
                              <input 
                                  type="text" 
                                  value={customModel} 
                                  onChange={e => setCustomModel(e.target.value)} 
                                  className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-100 text-sm font-bold text-slate-800 shadow-inner" 
                                  placeholder="gemini-2.5-flash" 
                              />
                          </div>

                          <div className="flex justify-end gap-2">
                              <button onClick={() => setShowApiModal(false)} className="px-6 py-2 font-bold text-slate-400 hover:bg-slate-50 rounded-xl transition-colors">Cancel</button>
                              <button 
                                  onClick={() => {
                                      localStorage.setItem('specscribe_gemini_key', customApiKey); 
                                      localStorage.setItem('specscribe_gemini_model', customModel); 
                                      setShowApiModal(false);
                                  }} 
                                  className="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center gap-2"
                              >
                                  <Save size={14} /> Save Configuration
                              </button>
                          </div>
                      </div>
                  </div>
                )}
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
