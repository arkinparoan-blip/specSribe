                                          <button onClick={() => { const n = [...(editBuffer.specs[activeSpecIndex].acceptance_criteria || []), "New requirement..."]; updateEditSpec('acceptance_criteria', n); }} className="w-full p-2 border-2 border-dashed border-emerald-200 rounded-lg text-emerald-500 font-bold text-[9px] flex items-center justify-center gap-1.5 hover:bg-emerald-50 transition-all">+ Add Criteria</button>
                                        </div>
                                      </div>
                                    </div>

                                    <div className="space-y-3">
                                      <h3 className="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 text-blue-600"><Database size={12} /> Data Model Logic</h3>
                                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        {(editBuffer.specs[activeSpecIndex].data_fields || []).map((f, i) => (
                                          <div key={i} className={`bg-white border border-slate-200 rounded-2xl p-4 space-y-2 shadow-sm relative group hover:border-indigo-100 transition-all ${f.isEnabled === false ? 'opacity-60 bg-slate-50' : ''}`}>
                                            <div className="flex justify-between items-start gap-1">
                                              <div className="flex-1 text-xs">
                                                <div className="flex items-center gap-1 mb-1">
                                                  <input value={String(f.name)} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].name = e.target.value; updateEditSpec('data_fields', n); }} className="font-bold text-slate-800 outline-none text-[10px] w-full bg-slate-50 px-1.5 py-0.5 rounded shadow-inner" placeholder="Field" />
                                                  {f.isRequired && <Asterisk size={8} className="text-red-500 shrink-0" />}
                                                </div>
                                                <select value={String(f.type)} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].type = e.target.value; updateEditSpec('data_fields', n); }} className="text-[8px] font-black uppercase text-indigo-600 bg-indigo-50 border-none rounded px-1 outline-none">
                                                  {['string','number','boolean','date','dropdown','checkbox','radio'].map(t => <option key={t} value={t}>{t}</option>)}
                                                </select>
                                              </div>
                                              <div className="flex flex-col gap-1 shrink-0 text-xs">
                                                <button onClick={() => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].isRequired = !f.isRequired; updateEditSpec('data_fields', n); }} className={`p-1 rounded ${f.isRequired ? 'bg-red-50 text-red-500' : 'bg-slate-100 text-slate-400'}`}><Asterisk size={10} /></button>
                                                <button onClick={() => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].isEnabled = !f.isEnabled; updateEditSpec('data_fields', n); }} className={`p-1 rounded ${f.isEnabled !== false ? 'bg-indigo-50 text-indigo-500' : 'bg-slate-200 text-slate-500'}`}>{f.isEnabled !== false ? <ToggleRight size={10} /> : <ToggleLeft size={10} />}</button>
                                              </div>
                                            </div>
                                            <textarea value={String(f.notes || "")} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].notes = e.target.value; updateEditSpec('data_fields', n); }} className="w-full text-[9px] text-slate-500 bg-slate-50 p-1.5 rounded border-none outline-none resize-none font-sans shadow-inner" placeholder="Notes..." rows={1} />
                                            <div className="pt-2 border-t border-slate-50 space-y-1">
                                              {['dropdown','radio','checkbox'].includes(f.type) && (
                                                <input value={Array.isArray(f.options) ? f.options.join(', ') : String(f.options || "")} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].options = e.target.value.split(',').map(s => s.trim()); updateEditSpec('data_fields', n); }} className="w-full text-[8px] bg-white border border-slate-100 rounded px-1.5 py-0.5 outline-none shadow-sm text-slate-700" placeholder="Options (CSV)..." />
                                              )}
                                              <input value={String(f.condition || "")} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].condition = e.target.value; updateEditSpec('data_fields', n); }} className="w-full text-[8px] bg-white border border-slate-100 rounded px-1.5 py-0.5 outline-none font-mono shadow-sm text-slate-700" placeholder="Logic..." />
                                              <input value={String(f.source || "")} onChange={(e) => { const n = [...editBuffer.specs[activeSpecIndex].data_fields]; n[i].source = e.target.value; updateEditSpec('data_fields', n); }} className="w-full text-[8px] bg-white border border-slate-100 rounded px-1.5 py-0.5 outline-none font-mono shadow-sm text-slate-700" placeholder="Source..." />
                                            </div>
                                            <button onClick={() => { const n = editBuffer.specs[activeSpecIndex].data_fields.filter((_, idx) => idx !== i); updateEditSpec('data_fields', n); }} className="opacity-0 group-hover:opacity-100 absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-1 transition-all shadow-md"><X size={10} /></button>
                                          </div>
                                        ))}
                                        <button onClick={() => { const n = [...(editBuffer.specs[activeSpecIndex].data_fields || []), { name: "field", type: "string", notes: "", options: [], condition: "", source: "", isRequired: false, isEnabled: true }]; updateEditSpec('data_fields', n); }} className="border-2 border-dashed border-slate-200 rounded-xl p-6 flex flex-col items-center justify-center text-slate-300 hover:border-indigo-200 hover:text-indigo-300 transition-all gap-1 shadow-sm"><PlusCircle size={20} /><span className="font-black uppercase tracking-widest text-[8px]">Add Field</span></button>
                                      </div>
                                    </div>
                                  </div>
                                ) : (
                                  <div className="space-y-10">
                                    <div className="space-y-3">
                                        <h3 className="text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-3 text-slate-400 border-l-4 border-indigo-600 pl-4">Functional Specification</h3>
                                        <div className="text-[11px] text-slate-700 leading-relaxed bg-slate-50/50 p-6 rounded-2xl border border-slate-100 shadow-inner whitespace-pre-wrap font-sans">{String(activeModuleData.result.specs?.[activeSpecIndex]?.details || "")}</div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 text-slate-700">
                                        <div className="space-y-6">
                                            <h3 className="text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-3 text-slate-400 border-l-4 border-blue-500 pl-4">Data Model</h3>
                                            <div className="space-y-3">
                                            {(activeModuleData.result.specs?.[activeSpecIndex]?.data_fields || []).map((f, i) => (
                                                <div key={i} className={`group bg-white border border-slate-100 p-4 rounded-xl shadow-sm hover:shadow-md transition-all relative overflow-hidden ${f.isEnabled === false ? 'opacity-50 grayscale bg-slate-50' : ''}`}>
                                                <div className="flex justify-between items-start mb-1.5 text-xs text-slate-700">
                                                    <div className="flex items-center gap-2">
                                                    <p className="text-[11px] font-bold">{String(f.name)}</p>
                                                    {f.isRequired && <span className="bg-red-50 text-red-500 text-[7px] font-black px-1 rounded uppercase tracking-tighter border border-red-100 shadow-sm">Mandatory</span>}
                                                    </div>
                                                    <span className="px-2 py-0.5 bg-indigo-50 text-indigo-600 text-[8px] font-black uppercase rounded-lg border border-indigo-100 shadow-sm">{String(f.type)}</span>
                                                </div>
                                                <p className="text-[10px] text-slate-500 leading-relaxed opacity-80">{String(f.notes)}</p>
                                                {( (Array.isArray(f.options) && f.options.length > 0) || f.condition || f.source) && (
                                                    <div className="flex flex-wrap gap-1.5 mt-2.5 pt-2 border-t border-slate-50 text-xs text-slate-600">
                                                    {Array.isArray(f.options) && f.options.length > 0 && <span className="bg-slate-100 px-1.5 py-0.5 rounded text-[8px] font-bold text-slate-500 uppercase flex items-center gap-1"><List size={8}/> {f.options.join(', ')}</span>}
                                                    {f.condition && <span className="bg-amber-50 px-1.5 py-0.5 rounded text-[8px] font-bold text-amber-700 uppercase border border-amber-100 flex items-center gap-1 shadow-sm"><Sparkles size={8}/> {String(f.condition)}</span>}
                                                    {f.source && <span className="bg-indigo-50 px-1.5 py-0.5 rounded text-[8px] font-bold text-indigo-700 uppercase border border-indigo-100 flex items-center gap-1 shadow-sm"><ArrowRightLeft size={8}/> {String(f.source)}</span>}
                                                    </div>
                                                )}
                                                </div>
                                            ))}
                                            </div>
                                        </div>
                                        <div className="space-y-6">
                                            <h3 className="text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-3 text-slate-400 border-l-4 border-emerald-500 pl-4">Acceptance Criteria</h3>
                                            <div className="space-y-3 text-xs">
                                            {(activeModuleData.result.specs?.[activeSpecIndex]?.acceptance_criteria || []).map((ac, i) => (
                                                <div key={i} className="flex gap-3 p-4 bg-emerald-50/50 border border-emerald-100 rounded-xl hover:bg-emerald-50 transition-all shadow-sm">
                                                <div className="mt-0.5 bg-emerald-500 text-white rounded-full p-0.5 shrink-0 shadow-md"><ChevronRight size={10} /></div>
                                                <p className="text-[11px] font-medium text-emerald-900 leading-normal">{String(ac)}</p>
                                                </div>
                                            ))}
                                            </div>
                                        </div>
                                    </div>
                                  </div>
                                )}
                              </div>
                            </div>
                          </div>
                        )
                      )}
                    </main>
                  </div>

                  {/* REVISION HISTORY OVERLAY */}
                  {showHistory && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300">
                      <div className="bg-white w-full max-w-5xl h-[85vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden animate-in zoom-in-95 duration-500 text-slate-800">
                        <div className="p-6 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center shrink-0">
                          <div className="flex items-center gap-3">
                            <History className="text-indigo-600" size={20} />
                            <h3 className="text-xl font-black tracking-tight text-slate-800">Unified Revision Audit Log</h3>
                          </div>
                          <button onClick={() => setShowHistory(false)} className="p-2 hover:bg-slate-200 rounded-xl transition-colors"><X size={24} /></button>
                        </div>
                        <div className="flex-1 flex overflow-hidden">
                            <div className="w-1/3 border-r border-slate-100 overflow-y-auto p-4 bg-slate-50/30">
                                <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 px-2">Project Activity</h4>
                                <div className="space-y-2">
                                    {(projectHistory || []).map((ph, i) => (
                                        <div key={i} className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm text-xs text-slate-700">
                                            <div className="flex items-center justify-between mb-1 text-[8px]">
                                                <span className="font-black uppercase text-indigo-600 px-1.5 py-0.5 bg-indigo-50 rounded shadow-inner">{String(ph.type)}</span>
                                                <span className="text-slate-400 font-mono">{formatDate(ph.timestamp)}</span>
                                            </div>
                                            <p className="text-[10px] text-slate-700 font-medium leading-tight">{String(ph.detail)}</p>
                                            <p className="text-[8px] text-slate-400 mt-2">By {String(ph.userName)}</p>
                                        </div>
                                    ))}
                                    {projectHistory.length === 0 && <p className="text-center text-slate-400 py-10 text-[10px] italic font-bold">No activity yet.</p>}
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-white text-xs text-slate-700">
                                <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 px-2">Module Blueprints & Specs</h4>
                                {(revisions || []).map((rev, i) => {
                                    const diffs = detectChanges(rev.before, rev.after);
                                    return (
                                    <div key={i} className="bg-slate-50 border border-slate-200 rounded-2xl p-6 space-y-4 relative group animate-in slide-in-from-bottom-2 text-slate-700">
                                        <div className="absolute top-4 right-4"><span className="px-2 py-0.5 bg-white text-indigo-600 rounded-lg text-[8px] font-black uppercase shadow-sm border font-mono">{String(rev.type || "Update")}</span></div>
                                        <div className="flex items-center gap-3">
                                        <UserCheck className="text-indigo-500" size={18} />
                                        <div><p className="text-xs font-black text-slate-800">{String(rev.userName || "Unknown")}</p><p className="text-[9px] text-slate-400 font-mono">{formatDate(rev.timestamp)}</p></div>
                                        </div>
                                        <div className="space-y-2 mt-4 text-[10px] text-slate-700">
                                        {diffs.map((d, di) => (
                                            <div key={di} className="bg-white border border-slate-100 rounded-xl p-4 shadow-sm text-[10px]">
                                                <div className="flex items-center gap-2 mb-2 font-black uppercase text-slate-500 text-[8px]">
                                                    <span>{String(d.section)}</span>
                                                    <span className={`${d.type === 'added' ? 'text-emerald-600' : d.type === 'removed' ? 'text-rose-600' : 'text-blue-600'}`}>
                                                        {d.type === 'added' ? '+ Addition' : d.type === 'removed' ? '- Removal' : '~ Update'}
                                                    </span>
                                                </div>
                                                {d.field && <div className="font-bold text-slate-800 mb-2">{String(d.field)}</div>}
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="bg-red-50/30 p-2 rounded-lg border border-red-50 text-red-900/60 line-through whitespace-pre-wrap break-all max-h-32 overflow-y-auto font-mono text-[9px]">{typeof d.from === 'object' ? JSON.stringify(d.from) : String(d.from || "Empty")}</div>
                                                    <div className="bg-emerald-50/30 p-2 rounded-lg border border-emerald-50 text-emerald-900 font-medium whitespace-pre-wrap break-all max-h-32 overflow-y-auto font-mono text-[9px]">{typeof d.to === 'object' ? JSON.stringify(d.to) : String(d.to || "Updated")}</div>
                                                </div>
                                            </div>
                                        ))}
                                        {diffs.length === 0 && <div className="text-slate-400 italic text-[10px]">Structural or metadata update detected.</div>}
                                        </div>
                                    </div>
                                    );
                                })}
                                {revisions.length === 0 && <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-50 py-20 text-xs text-center"><History size={48} className="mx-auto mb-4" /><p className="text-lg font-bold">No revisions yet.</p></div>}
                            </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* FLOW EXPLORER */}
                  {isFlowExplorerOpen && activeModuleData?.result && (
                    <div className="fixed inset-0 z-[60] flex flex-col bg-slate-900/95 backdrop-blur-md animate-in fade-in duration-300">
                       <nav className="p-4 border-b border-white/10 flex justify-between items-center shrink-0 text-white">
                          <div className="flex items-center gap-4 text-white">
                             <div className="p-2 bg-amber-500 rounded-lg text-white shadow-lg"><GitBranch size={20} /></div>
                             <div><h3 className="font-bold text-sm">{String(activeModuleData.result.specs?.[activeSpecIndex]?.feature_name || 'Logic Map')}</h3><p className="text-white/40 text-[10px] uppercase font-black tracking-widest">Process Architecture Explorer</p></div>
                          </div>
                          <div className="flex items-center gap-4">
                             <div className="flex bg-white/10 p-1 rounded-xl">
                                <button onClick={() => setZoomLevel(prev => Math.max(0.5, prev - 0.1))} className="p-2 hover:bg-white/10 text-white rounded-lg transition-all"><ZoomOut size={18}/></button>
                                <button onClick={() => setZoomLevel(1)} className="px-3 text-white text-[10px] font-bold border-x border-white/10">{Math.round(zoomLevel * 100)}%</button>
                                <button onClick={() => setZoomLevel(prev => Math.min(2, prev + 0.1))} className="p-2 hover:bg-white/10 text-white rounded-lg transition-all"><ZoomIn size={18}/></button>
                             </div>
                             <button onClick={() => setIsFlowExplorerOpen(false)} className="p-2 bg-white/10 hover:bg-white/20 text-white rounded-xl shadow-xl transition-all"><X size={24} /></button>
                          </div>
                       </nav>
                       <div className="flex-1 overflow-auto p-12 flex items-center justify-center bg-slate-900">
                          <div style={{ transform: `scale(${zoomLevel})`, transformOrigin: 'center center' }} className="transition-transform duration-200 ease-out bg-white p-20 rounded-[3rem] shadow-2xl">
                             {activeModuleData.result.specs?.[activeSpecIndex] ? (
                                <Mermaid id={`explorer-flow-${activeSpecIndex}`} chart={activeModuleData.result.specs[activeSpecIndex].flowchart_mermaid || 'graph TD\\n  Start["No logic mapped"]'} />
                             ) : (
                                <div className="text-slate-300 italic">Map Unavailable</div>
                             )}
                          </div>
                       </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
